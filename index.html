        {id:"savings",name:"Savings",color:"#FBBF24",budget:0,annual:true,rollover:0,subcats:[]}
      ],
      txs:[],goals:[],recurring:[],accounts:[{id:"acc_main",name:"Cheque Account",type:"cheque",balance:0,openingBalance:0,color:"#00E5A0",icon:"🏦"}],debts:[],unal:0,theme:D.theme,accent:D.accent,mode:D.mode||"simple",nudgeShown:{standard:false,power:false},lastRolloverMonth:mK(Date.now())
    });
    fl("All data cleared");
    closeOv();
  };
  return (<Ov title="Settings" onClose={closeOv} closing={ovClosing} ovSwap={ovSwap} G={G}>
    {/* Mode toggle */}
    <Lbl G={G}>Appearance</Lbl>
    <div style={{display:"flex",gap:8,marginBottom:16}}>
      {[["dark","🌙","Dark"],["light","☀️","Light"]].map(([k,ic,l])=>{const act=D.theme===k;return(
        <button key={k} onClick={()=>sv({...D,theme:k})} style={{flex:1,padding:"10px 8px",borderRadius:10,border:`1px solid ${act?A:(G?"rgba(255,255,255,.08)":"rgba(0,0,0,.08)")}`,background:act?`${A}15`:"transparent",color:act?A:(G?"#888":"#999"),fontSize:12,fontWeight:act?700:500,fontFamily:F2,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,...cT}}><span style={{fontSize:16}}>{ic}</span>{l}</button>
      )})}
    </div>
    {/* Mode switcher */}
    <Lbl G={G}>Experience Level</Lbl>
    <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:16}}>
      {MODES.map(m=>{const act=mode===m.id;return(
        <button key={m.id} onClick={()=>sv({...D,mode:m.id})} style={{padding:"12px 14px",borderRadius:12,border:`1.5px solid ${act?m.color:(G?"rgba(255,255,255,.06)":"rgba(0,0,0,.06)")}`,background:act?`${m.color}15`:(G?"rgba(15,20,30,.5)":"#fff"),cursor:"pointer",fontFamily:F2,textAlign:"left",boxShadow:act?`0 0 16px ${m.color}33`:"none",transition:"all .2s ease",display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:24}}>{m.icon}</span>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:act?700:600,color:act?m.color:(G?"#ccc":"#333")}}>{m.name}</div><div style={{fontSize:10,color:G?"#888":"#999",marginTop:2}}>{m.desc}</div></div>
          {act&&<div style={{width:20,height:20,borderRadius:10,background:m.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff",fontWeight:800}}>✓</div>}
        </button>)})}
    </div>
    {/* Theme accent picker */}
    {cs("accentPicker")&&<><Lbl G={G}>Accent Theme</Lbl>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:16}}>
      {Object.entries(THEMES).map(([k,t])=>{const act=cur===k;return(
        <button key={k} onClick={()=>{sv({...D,accent:k});fl(`${t.name} theme`)}} style={{padding:"10px 6px",borderRadius:10,border:`1.5px solid ${act?t.a1:(G?"rgba(255,255,255,.06)":"rgba(0,0,0,.06)")}`,background:act?`${t.a1}18`:(G?"rgba(15,20,30,.5)":"#fff"),cursor:"pointer",fontFamily:F2,display:"flex",flexDirection:"column",alignItems:"center",gap:4,boxShadow:act?`0 0 16px ${t.a1}33`:"none",transition:"all .2s ease"}}>
          <div style={{display:"flex",gap:3}}>
            <div style={{width:14,height:14,borderRadius:4,background:t.a1,border:"1px solid rgba(255,255,255,.15)"}}/>
            <div style={{width:14,height:14,borderRadius:4,background:t.a2,border:"1px solid rgba(255,255,255,.15)"}}/>
          </div>
          <span style={{fontSize:10,fontWeight:act?700:500,color:act?t.a1:(G?"#888":"#666")}}>{t.name}</span>
        </button>
      )})}
    </div></>}
    {/* Stats */}
    <div style={{fontSize:12,color:G?"#666":"#999",marginBottom:16,padding:"10px 12px",...glass(G),borderRadius:10,animation:"fu .3s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span>Envelopes</span><span style={{fontWeight:600,color:G?"#aaa":"#555"}}>{D.envs.length}</span></div>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span>Transactions</span><span style={{fontWeight:600,color:G?"#aaa":"#555"}}>{D.txs.length}</span></div>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span>Goals</span><span style={{fontWeight:600,color:G?"#aaa":"#555"}}>{D.goals.length}</span></div>
      <div style={{display:"flex",justifyContent:"space-between"}}><span>Recurring</span><span style={{fontWeight:600,color:G?"#aaa":"#555"}}>{D.recurring?.length||0}</span></div>
    </div>
    {/* Accounts management */}
    {cs("accountMgmt")&&<><Lbl G={G}>Accounts</Lbl>
    <div style={{marginBottom:16}}>
      {(D.accounts||[]).map(acc=>(<div key={acc.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:`1px solid ${G?"rgba(255,255,255,.04)":"rgba(0,0,0,.04)"}`}}>
        <span style={{fontSize:16}}>{acc.icon||"🏦"}</span>
        <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600,color:G?"#fff":"#1a1a2e"}}>{acc.name}</div><div style={{fontSize:10,color:G?"#666":"#999",textTransform:"capitalize"}}>{acc.type} · {fmt(acc.balance)}</div></div>
        <button onClick={()=>rmAccount(acc.id)} style={{background:"none",border:"none",color:G?"#444":"#bbb",cursor:"pointer",fontSize:14,...lT}}>×</button>
      </div>))}
      <Morph show={!newAcc} maxH={60}><button onClick={()=>setNewAcc(true)} style={{width:"100%",padding:"8px",borderRadius:8,border:`1px dashed ${G?"rgba(255,255,255,.12)":"rgba(0,0,0,.12)"}`,background:"transparent",color:G?"#888":"#999",fontSize:11,fontWeight:600,fontFamily:F2,cursor:"pointer",marginTop:6,...cT}}>+ Add Account</button></Morph>
      <Morph show={newAcc} maxH={700} ms={300}><div style={{marginTop:8,padding:"10px",...glass(G),borderRadius:10}}>
        <input type="text" enterKeyHint="done" value={accName} onChange={e=>setAccName(e.target.value)} placeholder="Account name..." style={{...si(G),marginBottom:8}}/>
        <div style={{display:"flex",gap:4,marginBottom:8}}>{["cheque","savings","credit"].map(t=>(<button key={t} onClick={()=>setAccType(t)} style={{flex:1,padding:"6px 4px",borderRadius:6,border:`1px solid ${accType===t?A:(G?"rgba(255,255,255,.08)":"rgba(0,0,0,.08)")}`,background:accType===t?`${A}15`:"transparent",color:accType===t?A:(G?"#888":"#999"),fontSize:10,fontWeight:accType===t?700:500,fontFamily:F2,cursor:"pointer",textTransform:"capitalize",...cT}}>{t}</button>))}</div>
        <div style={{marginBottom:8}}><AmtIn value={accBal} onChange={setAccBal} G={G}/></div>
        <div style={{display:"flex",gap:6}}><button onClick={()=>setNewAcc(false)} style={{flex:1,padding:"8px",borderRadius:8,border:`1px solid ${G?"#333":"#ddd"}`,background:"transparent",color:G?"#888":"#666",fontSize:12,fontWeight:600,fontFamily:F2,cursor:"pointer",...cT}}>Cancel</button><button onClick={addAccount} disabled={!accName.trim()} style={{flex:1,padding:"8px",borderRadius:8,border:"none",background:A,color:"#0a0b0f",fontSize:12,fontWeight:700,fontFamily:F2,cursor:"pointer",opacity:accName.trim()?1:.4,...cT}}>Add</button></div>
      </div></Morph>
    </div></>}
    {/* Data Export / Import */}
    <div style={{display:"flex",gap:8,marginBottom:12}}>
      <button onClick={()=>{const blob=new Blob([JSON.stringify(D,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`vault-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();setTimeout(()=>URL.revokeObjectURL(url),1000);fl("Backup exported",true)}} style={{flex:1,padding:"10px",borderRadius:10,border:`1px solid ${G?"rgba(255,255,255,.08)":"rgba(0,0,0,.08)"}`,background:"transparent",fontSize:12,fontWeight:600,fontFamily:F2,color:A,cursor:"pointer",...cT}}>📤 Export Backup</button>
      <label style={{flex:1,padding:"10px",borderRadius:10,border:`1px solid ${G?"rgba(255,255,255,.08)":"rgba(0,0,0,.08)"}`,background:"transparent",fontSize:12,fontWeight:600,fontFamily:F2,color:A,cursor:"pointer",textAlign:"center",...cT}}>📥 Import Backup<input type="file" accept=".json" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const parsed=JSON.parse(ev.target.result);if(!parsed.envs||!parsed.txs){fl("Invalid backup file",true);return}const restored=reconcileAccounts(migrateOpeningBalances(parsed));sv(restored,true);fl("Backup restored!",true)}catch{fl("Failed to parse file",true)}};r.readAsText(f)}}/></label>
    </div>
    {/* Install as App */}
    {(()=>{const isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
      if(isStandalone)return <div style={{marginBottom:12,padding:"10px 14px",borderRadius:10,background:`${A}08`,border:`1px solid ${A}20`,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:16}}>✅</span><span style={{fontSize:12,color:A,fontWeight:600}}>Installed as app</span></div>;
      return <button onClick={()=>{if(window.__vb_installPrompt){window.__vb_installPrompt.prompt();window.__vb_installPrompt.userChoice.then(r=>{if(r.outcome==="accepted")fl("App installed!",true);window.__vb_installPrompt=null})}else{fl("Use your browser's 'Add to Home Screen' option",true)}}} style={{width:"100%",padding:"12px",borderRadius:10,border:`1px solid ${A}33`,background:`linear-gradient(135deg,${A}12,${A2}12)`,fontSize:13,fontWeight:700,fontFamily:F2,color:A,cursor:"pointer",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"center",gap:8,...cT}}>📲 Install as App</button>;
    })()}
    <Morph show={!confirm} maxH={60}><button onClick={()=>{setConfirm(true);setResetInput("")}} style={{width:"100%",padding:"12px",borderRadius:10,border:`1px solid ${G?"rgba(239,68,68,.3)":"rgba(239,68,68,.2)"}`,fontSize:13,fontWeight:600,fontFamily:"'DM Sans',sans-serif",color:"#EF4444",cursor:"pointer",background:"transparent",...cT}}>Reset All Data</button></Morph>
    <Morph show={confirm} maxH={300} ms={300}><div style={{padding:16,...glass(G),borderRadius:14,border:"1px solid rgba(239,68,68,.25)"}}>
          <div style={{fontSize:13,color:"#EF4444",fontWeight:700,marginBottom:6,textAlign:"center"}}>⚠ This will permanently delete all your data</div>
          <div style={{fontSize:11,color:G?"#888":"#777",marginBottom:12,textAlign:"center",lineHeight:1.5}}>All transactions, envelopes, goals, accounts, and debts will be erased. This cannot be undone.</div>
          <div style={{fontSize:11,color:G?"#aaa":"#555",fontWeight:600,marginBottom:6}}>Type <span style={{color:"#EF4444",fontFamily:"monospace",letterSpacing:1}}>RESET</span> to confirm</div>
          <input type="text" enterKeyHint="done" value={resetInput} onChange={e=>setResetInput(e.target.value)} placeholder="Type RESET here..." autoComplete="off" spellCheck="false" style={{width:"100%",padding:"10px 12px",border:`1px solid ${resetReady?"#EF4444":(G?"rgba(255,255,255,.1)":"#ddd")}`,borderRadius:8,fontSize:14,fontFamily:"monospace",color:resetReady?"#EF4444":(G?"#fff":"#1a1a2e"),outline:"none",marginBottom:12,background:G?"rgba(255,255,255,.05)":"#fff",letterSpacing:2,textAlign:"center"}}/>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{setConfirm(false);setResetInput("")}} style={{flex:1,padding:"12px",borderRadius:10,border:"1px solid "+(G?"#333":"#ddd"),background:"transparent",fontSize:13,fontWeight:700,fontFamily:"'DM Sans',sans-serif",color:G?"#888":"#666",cursor:"pointer",...cT}}>Cancel</button>
            <button onClick={reset} disabled={!resetReady} style={{flex:1,padding:"12px",borderRadius:10,border:"none",fontSize:13,fontWeight:700,fontFamily:"'DM Sans',sans-serif",color:"#fff",cursor:resetReady?"pointer":"not-allowed",background:resetReady?"#EF4444":(G?"#333":"#ccc"),opacity:resetReady?1:.5,transition:"all .2s"}}>Erase Everything</button>
          </div>
        </div></Morph>
  </Ov>);
}

function OnboardOv({D,sv,G,fl,onDone,closing}){
  const[step,setStep]=useState(0);
  const[income,setIncome]=useState("");
  const[accName,setAccName]=useState("Cheque Account");
  const[accBal,setAccBal]=useState("");
  const[budgets,setBudgets]=useState({});
  const[selMode,setSelMode]=useState("simple");
  const t1=G?"#fff":"#1a1a2e",t2=G?"#888":"#777",t3=G?"#444":"#bbb";
  const skip=()=>{sv({...D,mode:selMode},true);onDone();fl("Loaded demo data",true)};
  const finish=()=>{
    const inc=parseFloat(income)||0;const bal=parseFloat(accBal)||0;
    const envs=DENV.map(e=>({...e,budget:parseFloat(budgets[e.id])||0}));
    const txs=inc>0?[{id:uid(),type:"inc",amt:inc,desc:"Starting Income",payee:"Income",eid:"_inc",subcat:"",note:"",accountId:"acc_main",ts:Date.now()}]:[];
    const next={envs,txs,goals:[],recurring:[],accounts:[{id:"acc_main",name:accName.trim()||"Main Account",type:"cheque",balance:bal+(inc>0?inc:0),openingBalance:bal,color:"#00E5A0",icon:"🏦"}],debts:[],unal:inc,theme:D.theme||"dark",accent:D.accent||"vault",mode:selMode,nudgeShown:{standard:false,power:false},lastRolloverMonth:mK(Date.now())};
    sv(next,true);onDone();fl("Welcome to Vault!",true)};
  const upBudget=(id,v)=>setBudgets({...budgets,[id]:v});
  const steps=[
    // 0: Welcome
    <div key={0} style={{textAlign:"center",padding:"20px 0"}}>
      <div style={{fontSize:48,marginBottom:12}}>💰</div>
      <div style={{fontSize:24,fontWeight:900,fontFamily:F,color:t1,marginBottom:6}}>Welcome to Vault</div>
      <div style={{fontSize:13,color:t2,marginBottom:16,lineHeight:1.6}}>Your personal budget command center. Let's get you set up in under a minute.</div>
      <div style={{fontSize:11,color:t2,fontWeight:600,marginBottom:8}}>How much do you want to see?</div>
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:20,textAlign:"left"}}>
        {MODES.map(m=>{const act=selMode===m.id;return(
          <button key={m.id} onClick={()=>setSelMode(m.id)} style={{padding:"10px 12px",borderRadius:10,border:`1.5px solid ${act?m.color:(G?"rgba(255,255,255,.06)":"rgba(0,0,0,.08)")}`,background:act?`${m.color}15`:"transparent",cursor:"pointer",fontFamily:F2,display:"flex",alignItems:"center",gap:10,transition:"all .15s"}}>
            <span style={{fontSize:20}}>{m.icon}</span>
            <div style={{flex:1}}><div style={{fontSize:12,fontWeight:act?700:600,color:act?m.color:(G?"#ccc":"#444")}}>{m.name}</div><div style={{fontSize:10,color:G?"#888":"#999"}}>{m.desc}</div></div>
            {act&&<div style={{width:16,height:16,borderRadius:8,background:m.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff",fontWeight:800}}>✓</div>}
          </button>)})}
      </div>
      <button onClick={()=>setStep(1)} style={{...pb(),background:`linear-gradient(135deg,${A},${A2})`,marginBottom:8}}>Let's Go →</button>
      <button onClick={skip} style={{background:"none",border:"none",color:t3,fontSize:12,fontFamily:F2,cursor:"pointer",...lT}}>Skip — use demo data</button>
    </div>,
    // 1: Account
    <div key={1}>
      <div style={{fontSize:16,fontWeight:800,fontFamily:F,color:t1,marginBottom:4}}>Your Account</div>
      <div style={{fontSize:12,color:t2,marginBottom:14}}>What's your main bank account called?</div>
      <input type="text" enterKeyHint="done" value={accName} onChange={e=>setAccName(e.target.value)} placeholder="e.g. FNB Cheque" style={si(G)}/>
      <Lbl G={G}>Current Balance (optional)</Lbl>
      <div style={{marginBottom:14}}><AmtIn value={accBal} onChange={setAccBal} G={G}/></div>
      <button onClick={()=>setStep(2)} style={{...pb(),background:A}}>Next →</button>
    </div>,
    // 2: Income
    <div key={2}>
      <div style={{fontSize:16,fontWeight:800,fontFamily:F,color:t1,marginBottom:4}}>Monthly Income</div>
      <div style={{fontSize:12,color:t2,marginBottom:14}}>How much do you earn per month? You can change this anytime.</div>
      <div style={{marginBottom:14}}><AmtIn value={income} onChange={setIncome} G={G}/></div>
      <button onClick={()=>setStep(3)} style={{...pb(),background:A}}>Next →</button>
      <button onClick={()=>setStep(1)} style={{background:"none",border:"none",color:A,fontSize:12,fontFamily:F2,cursor:"pointer",display:"block",margin:"8px auto 0",...lT}}>← Back</button>
    </div>,
    // 3: Budgets
    <div key={3}>
      <div style={{fontSize:16,fontWeight:800,fontFamily:F,color:t1,marginBottom:4}}>Set Budgets</div>
      <div style={{fontSize:12,color:t2,marginBottom:14}}>How much for each category? Leave blank to skip any.</div>
      <div style={{maxHeight:"40vh",overflowY:"auto",marginBottom:14}}>
        {DENV.map(e=>(<div key={e.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:`1px solid ${G?"rgba(255,255,255,.04)":"rgba(0,0,0,.04)"}`}}>
          <div style={{width:8,height:8,borderRadius:2,background:e.color,flexShrink:0}}/>
          <span style={{flex:1,fontSize:12,fontWeight:600,color:t1}}>{e.name}</span>
          <div style={{display:"flex",alignItems:"center",gap:2}}><span style={{fontSize:10,color:t3}}>R</span><input type="number" value={budgets[e.id]||""} onChange={ev=>upBudget(e.id,ev.target.value)} placeholder="0" style={{width:70,padding:"5px 8px",borderRadius:6,border:`1px solid ${G?"rgba(255,255,255,.1)":"#ddd"}`,background:G?"rgba(255,255,255,.05)":"#fff",color:t1,fontSize:12,fontFamily:F2,textAlign:"right"}}/></div>
        </div>))}
      </div>
      <button onClick={finish} style={{...pb(),background:`linear-gradient(135deg,${A},${A2})`}}>Start Budgeting! 🚀</button>
      <button onClick={()=>setStep(2)} style={{background:"none",border:"none",color:A,fontSize:12,fontFamily:F2,cursor:"pointer",display:"block",margin:"8px auto 0",...lT}}>← Back</button>
    </div>
  ];
  return (<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:closing?"fi .3s ease reverse forwards":"fi .4s cubic-bezier(.22,1,.36,1)",pointerEvents:closing?"none":"auto"}}>
    <div style={{background:G?"rgba(15,20,30,.95)":"#fff",backdropFilter:G?"blur(24px)":"none",WebkitBackdropFilter:G?"blur(24px)":"none",border:G?"1px solid rgba(255,255,255,.08)":"none",borderRadius:20,padding:"24px",width:"100%",maxWidth:400,maxHeight:"85vh",overflowY:"auto",animation:closing?"modalCenterOut .3s ease forwards":"modalCenterIn .5s cubic-bezier(.22,1,.36,1)",boxShadow:G?`0 24px 64px rgba(0,0,0,.6), 0 0 32px ${A}14`:"0 24px 64px rgba(0,0,0,.18)"}}>
      <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:16}}>
        {[0,1,2,3].map(i=>(<div key={i} style={{width:step===i?24:8,height:4,borderRadius:2,background:i<=step?A:(G?"rgba(255,255,255,.1)":"rgba(0,0,0,.1)"),transition:"all .3s"}}/>))}
      </div>
      <div key={step} style={{animation:"fu .3s ease"}}>{steps[step]}</div>
    </div>
  </div>);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
  <script>setTimeout(()=>{const m=document.getElementById('load-msg');if(m&&m.textContent==='Loading...')m.textContent='Still loading scripts... make sure you have internet.'},8000)</script>
</body>
