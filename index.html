/* ═══ DEBUG SYSTEM ═══
   window.__vb is the global debug interface. Activate by:
   - Visiting URL with ?debug=1 (persists)
   - 5x tapping the cog icon in the dashboard header
   - localStorage.setItem('vb_debug','1') in DevTools console
   Disable: tap "OFF" in the overlay header, or window.__vb.disable() */
const __VB_LOG_MAX = 800;
const __vb_log = [];
const __vb_listeners = new Set();
function __vb_track(cat, name, payload) {
  const e = { t: Date.now(), cat, name, payload };
  __vb_log.unshift(e);
  if (__vb_log.length > __VB_LOG_MAX) __vb_log.length = __VB_LOG_MAX;
  __vb_listeners.forEach(fn => { try { fn(e) } catch {} });
}
window.__vb = {
  log: __vb_log,
  track: __vb_track,
  enable() { localStorage.setItem('vb_debug','1'); location.reload() },
  disable() { localStorage.removeItem('vb_debug'); location.reload() },
  clear() { __vb_log.length = 0; __vb_listeners.forEach(fn => fn(null)) },
  dump() {
    return __vb_log.map(e => {
      const ts = new Date(e.t).toISOString().slice(11,23);
      const pl = e.payload != null ? ' ' + JSON.stringify(e.payload) : '';
      return `${ts} [${e.cat}] ${e.name}${pl}`;
    }).join('\n');
  }
};
const __VB_DEBUG = (() => {
  if (location.search.includes('debug=1')) { localStorage.setItem('vb_debug','1'); return true }
  return localStorage.getItem('vb_debug') === '1';
})();
__vb_track('life', 'boot', { debug: __VB_DEBUG, ua: navigator.userAgent.slice(0,80), w: window.innerWidth, h: window.innerHeight });

  window.addEventListener('load', () => {
    __vb_track('life', 'window.load', {});
    if (performance && performance.getEntriesByType) {
      try {
        const res = performance.getEntriesByType('resource');
        res.forEach(r => __vb_track('net', r.name.split('/').pop().split('?')[0] || r.name, { dur: Math.round(r.duration), size: r.transferSize, type: r.initiatorType }));

    const btn = e.target.closest && e.target.closest('button, a');
    if (!btn) return;
    const lbl = (btn.textContent || '').trim().replace(/\s+/g,' ').slice(0,50) || btn.id || btn.getAttribute('aria-label') || '(no label)';

    const i = e.target;
    if (!i || (i.tagName !== 'INPUT' && i.tagName !== 'TEXTAREA')) return;
    clearTimeout(__vb_inputT);
    __vb_inputT = setTimeout(() => {
      __vb_track('input', i.placeholder || i.name || i.type || 'input', { val: String(i.value || '').slice(0,40), type: i.type });
    }, 250);
  }, true);
  // Service worker bridge — receive logs from vault-sw.js
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.addEventListener('message', e => {
      const m = e.data;
      if (m && m.__vb_sw) __vb_track(m.cat || 'sw', m.name, m.payload);
    });
  }
}

function EnvDet({D,sv,fl,G,spent,rem,selE,setSelE,setOv,period,setPeriod,pTxs}){const t1=G?"#fff":"#1a1a2e",t2=G?"#888":"#777",t3=G?"#444":"#bbb";

function Ov({title,onClose,G,children,closing,ovSwap}){
  const ww=window.innerWidth;
  const centered=ww>=820;
  const mw=centered?480:(ww>600?640:460);
  const[dragY,setDragY]=useState(0);
  const dragRef=useRef({y:0,active:false});
  const dragStart=(e)=>{if(centered)return;__vb_track('gesture','modal.dragStart',{});dragRef.current={y:e.touches[0].clientY,active:true};setDragY(0)};
  const dragMove=(e)=>{if(centered||!dragRef.current.active)return;const dy=e.touches[0].clientY-dragRef.current.y;if(dy>0){setDragY(dy);e.preventDefault()}};
  const dragEnd=()=>{if(centered)return;dragRef.current.active=false;if(dragY>100){__vb_track('gesture','modal.dragDismiss',{dy:Math.round(dragY)});onClose()}else{__vb_track('gesture','modal.dragSnap',{dy:Math.round(dragY)});setDragY(0)}};

  const oldest=D.txs.length>0?Math.min(...D.txs.map(t=>t.ts)):Date.now();
  const maxMonths=Math.max(Math.ceil((Date.now()-oldest)/(864e5*30.4))+1,3);
  const n=gp>=999?maxMonths:Math.min(gp,maxMonths);
  const title=(()=>{
    if(gt==="envTrend"){const e=D.envs.find(x=>x.id===ov.eid);return`${e?.name||"Envelope"} Trend`}
    if(gt==="incVsExp")return"Income vs Expenses";
    if(gt==="balanceHistory")return"Total Balance";
    if(gt==="dailySpend")return"Daily Spending";
    if(gt==="healthTrend")return"Health Trend";
    if(gt==="spendPace"){const e=D.envs.find(x=>x.id===ov.eid);return`${e?.name||""} Spending Pace`}
    if(gt==="goalProgress"){const g=D.goals.find(x=>x.id===ov.goalId);return`${g?.name||"Goal"} Progress`}
    if(gt==="debtPaydown"){const d=(D.debts||[]).find(x=>x.id===ov.debtId);return`${d?.name||"Debt"} Paydown`}
    if(gt==="payeeHistory")return`${ov.payee||"Payee"} History`;
    if(gt==="accountBalance"){const a=(D.accounts||[]).find(x=>x.id===ov.accountId);return`${a?.name||"Account"} Balance`}
    if(gt==="monthlyBreakdown")return"Monthly Breakdown";
    if(gt==="savingsDetail")return"Savings Rate";

    if(gt==="subcatTrend")return`${ov.subcat||"Subcategory"} Trend`;
    return"Chart";
  })();
  return(<Ov title={title} onClose={closeOv} closing={ovClosing} ovSwap={ovSwap} G={G}>

    <div style={{display:"flex",gap:4,marginBottom:14}}>
      {GP.map((p,pi)=>{const act=gp===p.k;return(<button key={p.k} onClick={()=>{setGp(p.k);setTip(null)}} style={{padding:"5px 10px",borderRadius:7,border:`1px solid ${act?A:(G?"rgba(255,255,255,.08)":"rgba(0,0,0,.08)")}`,background:act?`${A}18`:"transparent",color:act?A:(G?"#888":"#999"),fontSize:10,fontWeight:act?700:500,fontFamily:F2,cursor:"pointer",letterSpacing:.3,animation:`fu .35s cubic-bezier(.22,1,.36,1) ${pi*.06}s both`,transform:act?"scale(1.05)":"none",boxShadow:act&&G?`0 0 12px ${A}40`:"none",...cT}}>{p.l}</button>)})}
    </div>

    {(()=>{const ms=gMonths(n);const first=ms[0],last=ms[ms.length-1];const fD=new Date(first.start),lD=new Date(last.start);const fmt2=d=>d.toLocaleDateString("en-ZA",{month:"short",year:"numeric"});return ms.length>1?<div style={{fontSize:9,color:t3,textAlign:"center",marginBottom:8,marginTop:-6,fontWeight:500}}>{fmt2(fD)} – {fmt2(lD)} · {ms.length} months</div>:null})()}
    {/* Tooltip */}

      {tip&&<div style={{fontSize:11,fontWeight:700,color:A,textAlign:"center",fontFamily:F,animation:"fu .2s cubic-bezier(.22,1,.36,1)",padding:"4px 0"}} key={tip}>{tip}</div>}
    </div>

    {gt==="subcatTrend"&&<EnvTrendChart D={D} G={G} eid={ov.eid} subcat={ov.subcat} n={n} tip={tip} setTip={setTip}/>}

/* ── Envelope Trend Bar Chart ── */
function EnvTrendChart({D,G,eid,subcat,n,tip,setTip}){
  const t1=G?"#fff":"#1a1a2e",t3=G?"#444":"#bbb";
  const env=D.envs.find(e=>e.id===eid);
  const data=gByMonth(D.txs,{n,type:"exp",eid,subcat});
  const maxV=Math.max(...data.map(d=>d.sum),1);
  const budget=env?.budget||0;
  const W=320,H=180,padL=42,padR=10,padT=12,padB=28;
  const cW=W-padL-padR,cH=H-padT-padB;
  const barW=Math.min(cW/data.length-4,36);
  const scaleMax=Math.max(maxV,budget*1.1||maxV);
  const scaleY=v=>padT+cH-(v/scaleMax)*cH;
  const totalSpent=data.reduce((s,d)=>s+d.sum,0);
  const filledMonths=data.filter(d=>d.sum>0);
  const avg=filledMonths.length>0?totalSpent/filledMonths.length:0;
  const overCount=budget>0?data.filter(d=>d.sum>budget).length:0;
  const cur=data[data.length-1]?.sum||0;const prev=data[data.length-2]?.sum||0;
  const momPct=prev>0?Math.round((cur-prev)/prev*100):0;

    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block",overflow:"visible"}}>
      {[0,.25,.5,.75,1].map(p=>{const y=padT+cH*(1-p);return(<g key={p}><line x1={padL} x2={W-padR} y1={y} y2={y} stroke={G?"rgba(255,255,255,.06)":"rgba(0,0,0,.06)"} strokeDasharray="3,3"/><text x={padL-4} y={y+3} textAnchor="end" style={{fontSize:8,fill:t3}}>{fS(scaleMax*p)}</text></g>)})}
      {budget>0&&<><line x1={padL} x2={W-padR} y1={scaleY(budget)} y2={scaleY(budget)} stroke={A} strokeWidth="1" strokeDasharray="5,3" opacity=".6"/>
        <text x={W-padR} y={scaleY(budget)-4} textAnchor="end" style={{fontSize:7,fill:A,fontWeight:700}}>Budget {fS(budget)}</text></>}
      {avg>0&&<line x1={padL} x2={W-padR} y1={scaleY(avg)} y2={scaleY(avg)} stroke="#F59E0B" strokeWidth="1" strokeDasharray="3,4" opacity=".4"/>}
      {data.map((d,i)=>{const x=padL+(cW/data.length)*i+(cW/data.length-barW)/2;const h=d.sum>0?(d.sum/scaleMax)*cH:0;const y=padT+cH-h;const over=budget>0&&d.sum>budget;const col=over?"#EF4444":(env?.color||A);const isHigh=d===highMonth&&filledMonths.length>1;const active=tip&&tip.startsWith(d.label);return(<g key={d.mk}>
        <rect x={x} y={y} width={barW} height={Math.max(h,0)} rx="3" fill={col} opacity={active?.95:.75} style={{cursor:"pointer",transition:"opacity .15s"}}
          onPointerDown={()=>setTip(`${d.label}: ${fmt(d.sum)}${over?" ⚠ over budget":""}${d.txs?.length?` · ${d.txs.length} tx`:""}`)} onPointerLeave={()=>setTip(null)}>
          <animate attributeName="height" from="0" to={Math.max(h,0)} dur={`${.3+i*.06}s`} fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1"/>
          <animate attributeName="y" from={padT+cH} to={y} dur={`${.3+i*.06}s`} fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1"/>
        </rect>
        <text x={x+barW/2} y={H-padB+14} textAnchor="middle" style={{fontSize:8,fill:t3}}>{xLabel(i,data.length)?d.labelY||d.label:""}</text>
        {isHigh&&<text x={x+barW/2} y={y-10} textAnchor="middle" style={{fontSize:6,fill:"#F59E0B",fontWeight:700,animation:"cHighPop .35s ease .7s both"}}>HIGH</text>}
        {d.sum>0&&<text x={x+barW/2} y={y-3} textAnchor="middle" style={{fontSize:7,fill:t1,fontWeight:600,opacity:active?1:0,transition:"opacity .15s"}}>{fS(d.sum)}</text>}
      </g>)})}

      {budget>0&&<span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:12,height:0,borderTop:`2px dashed ${A}`}}/> Budget</span>}

    </div>

      ...(budget>0?[{label:"OVER BUDGET",value:`${overCount}×`,sub:`of ${data.length} mo`,color:overCount>0?"#EF4444":A}]:[])

/* ── Balance History Line Chart ── */
function BalHistChart({D,G,n,tip,setTip}){
  const t1=G?"#fff":"#1a1a2e",t3=G?"#444":"#bbb";
  const months=gMonths(n);
  // Compute balance at each month-end by replaying account transactions
  const data=months.map(m=>{
    const bal=(D.accounts||[]).reduce((s,acc)=>{
      const txSum=D.txs.filter(t=>t.accountId===acc.id&&t.ts<m.end).reduce((a,t)=>a+t.amt,0);
      return s+(acc.openingBalance||0)+txSum;
    },0);
    return{...m,bal};
  });
  const maxV=Math.max(...data.map(d=>d.bal),1);const minV=Math.min(...data.map(d=>d.bal),0);const range=maxV-minV||1;
  const W=320,H=180,padL=46,padR=10,padT=16,padB=28;

  const linePts=pts.map(p=>`${p.x},${p.y}`).join(" ");

  const lowPt=data.reduce((m,d)=>d.bal<m.bal?d:m,data[0]);

      {[0,.25,.5,.75,1].map(p=>{const y=padT+cH*(1-p);return(<g key={p}><line x1={padL} x2={W-padR} y1={y} y2={y} stroke={G?"rgba(255,255,255,.06)":"rgba(0,0,0,.06)"} strokeDasharray="3,3"/><text x={padL-4} y={y+3} textAnchor="end" style={{fontSize:8,fill:t3}}>{fS(minV+range*p)}</text></g>)})}

      <defs><linearGradient id="balGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={A} stopOpacity=".6"/><stop offset="100%" stopColor={A} stopOpacity=".05"/></linearGradient></defs>
      <polyline points={linePts} fill="none" stroke={A} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="1000" strokeDashoffset="1000"><animate attributeName="stroke-dashoffset" from="1000" to="0" dur="1s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1"/></polyline>
      {pts.map((p,i)=>{const isHigh=p.d===highPt&&data.length>2;const isLow=p.d===lowPt&&data.length>2;return(<g key={i}><circle cx={p.x} cy={p.y} r={isHigh||isLow?dotRH(data.length):dotR(data.length)} fill={isHigh?A:isLow?"#F59E0B":A} stroke={G?"#0a0b0f":"#fff"} strokeWidth={dotSW(data.length)} style={{cursor:"pointer",animation:"fi .4s ease .4s both"}} onPointerDown={()=>setTip(`${p.d.label}: ${fmt(p.d.bal)}`)} onPointerLeave={()=>setTip(null)}/>

        <text x={p.x} y={H-padB+14} textAnchor="middle" style={{fontSize:8,fill:t3}}>{xLabel(i,pts.length)?p.d.labelY||p.d.label:""}</text></g>)})}

/* ── Daily Spending Bar Chart (current month) ── */

  const mStart=new Date(y,m,1).getTime();const mEnd=new Date(y,m+1,1).getTime();
  const txs=D.txs.filter(t=>t.ts>=mStart&&t.ts<mEnd&&t.type==="exp");
  const byDay=Array.from({length:daysInMonth},(_,i)=>{const day=i+1;const ds=new Date(y,m,day).getTime();const de=new Date(y,m,day+1).getTime();const sum=txs.filter(t=>t.ts>=ds&&t.ts<de).reduce((s,t)=>s+Math.abs(t.amt),0);return{day,sum}});
  const maxV=Math.max(...byDay.map(d=>d.sum),1);

          onPointerDown={future?undefined:()=>setTip(`Day ${d.day}: ${fmt(d.sum)}${d.sum===0?" · No spend!":""}`)} onPointerLeave={()=>setTip(null)}/>
        {d.day%5===1&&<text x={x+barW/2} y={H-padB+12} textAnchor="middle" style={{fontSize:7,fill:t3}}>{d.day}</text>}

      <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,borderRadius:2,background:"#EF4444"}}/> Over target</span>
    </div>
    <StatRow G={G} items={[
      {label:"SPENT SO FAR",value:fS(totalSpent),sub:`day ${today} of ${daysInMonth}`},

/* ── Spending Pace: Current vs Last Month ── */
function SpendPaceChart({D,G,eid,tip,setTip}){
  const t1=G?"#fff":"#1a1a2e",t3=G?"#444":"#bbb";const env=D.envs.find(e=>e.id===eid);
  const now=new Date();const y=now.getFullYear(),m=now.getMonth();const today=now.getDate();
  const curStart=new Date(y,m,1).getTime(),curEnd=new Date(y,m+1,1).getTime();
  const prevStart=new Date(y,m-1,1).getTime(),prevEnd=curStart;
  const daysInCur=new Date(y,m+1,0).getDate();const daysInPrev=new Date(y,m,0).getDate();
  const cumul=(txs,start,days)=>{const r=[];let s=0;for(let d=1;d<=days;d++){const ds=new Date(new Date(start).getFullYear(),new Date(start).getMonth(),d).getTime();const de=new Date(new Date(start).getFullYear(),new Date(start).getMonth(),d+1).getTime();s+=txs.filter(t=>t.ts>=ds&&t.ts<de).reduce((a,t)=>a+Math.abs(t.amt),0);r.push(s)}return r};
  const curTxs=D.txs.filter(t=>t.ts>=curStart&&t.ts<curEnd&&t.type==="exp"&&t.eid===eid);
  const prevTxs=D.txs.filter(t=>t.ts>=prevStart&&t.ts<prevEnd&&t.type==="exp"&&t.eid===eid);
  const curC=cumul(curTxs,curStart,daysInCur);const prevC=cumul(prevTxs,prevStart,daysInPrev);
  const maxV=Math.max(...curC,...prevC,1);
  const W=320,H=180,padL=42,padR=10,padT=12,padB=28,cW=W-padL-padR,cH=H-padT-padB;
  const mkPts=(arr,days)=>arr.map((v,i)=>`${padL+cW/(days-1||1)*i},${padT+cH-(v/maxV)*cH}`).join(" ");
  const curPts=mkPts(curC,daysInCur);const prevPts=mkPts(prevC,daysInPrev);
  const curAtDay=curC[today-1]||0;const prevAtDay=prevC[Math.min(today-1,prevC.length-1)]||0;
  const prevTotal=prevC[prevC.length-1]||0;

  const delta=prevAtDay>0?Math.round((curAtDay-prevAtDay)/prevAtDay*100):0;
  if(curC.every(v=>v===0)&&prevC.every(v=>v===0))return(<div style={{padding:32,textAlign:"center",color:t3,fontSize:13}}>Not enough data yet — keep tracking!</div>);

      {[0,.25,.5,.75,1].map(p=>{const yy=padT+cH*(1-p);return(<g key={p}><line x1={padL} x2={W-padR} y1={yy} y2={yy} stroke={G?"rgba(255,255,255,.06)":"rgba(0,0,0,.06)"} strokeDasharray="3,3"/><text x={padL-4} y={yy+3} textAnchor="end" style={{fontSize:8,fill:t3}}>{fS(maxV*p)}</text></g>)})}
      {budget>0&&<line x1={padL} x2={W-padR} y1={padT+cH-(budget/maxV)*cH} y2={padT+cH-(budget/maxV)*cH} stroke={A} strokeWidth="1" strokeDasharray="5,3" opacity=".4"/>}
      <polyline points={prevPts} fill="none" stroke={G?"rgba(255,255,255,.3)":"rgba(0,0,0,.2)"} strokeWidth="2" strokeDasharray="6,4" strokeLinecap="round"/>

      <polyline points={curPts} fill="none" stroke={env?.color||A} strokeWidth="2.5" strokeLinecap="round" strokeDasharray="1000" strokeDashoffset="1000"><animate attributeName="stroke-dashoffset" from="1000" to="0" dur="1s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1"/></polyline>
      {today<=daysInCur&&<line x1={padL+cW/(daysInCur-1)*(today-1)} y1={padT} x2={padL+cW/(daysInCur-1)*(today-1)} y2={padT+cH} stroke={A} strokeWidth="1" opacity=".3" strokeDasharray="2,2"/>}
      {[1,8,15,22,daysInCur].filter((v,i,a)=>a.indexOf(v)===i).map(d=>(<text key={d} x={padL+cW/(daysInCur-1)*(d-1)} y={H-padB+14} textAnchor="middle" style={{fontSize:8,fill:t3}}>{d}</text>))}
    </svg>

      <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:12,height:0,borderTop:`2.5px solid ${env?.color||A}`}}/> This month</span>
      <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:12,height:0,borderTop:`2px dashed ${G?"rgba(255,255,255,.3)":"rgba(0,0,0,.2)"}`}}/> Last month</span>
    </div>
    <StatRow G={G} items={[
      {label:"SO FAR",value:fS(curAtDay),sub:`day ${today} · ${pctElapsed}%`},
      {label:"VS LAST",value:delta!==0?(delta>0?`${delta}% more`:`${Math.abs(delta)}% less`):"Same",color:delta>10?"#EF4444":delta<-10?A:undefined},
      ...(budget>0?[{label:"BUDGET USED",value:`${budgetPct}%`,color:budgetPct>pctElapsed?"#EF4444":A,sub:budgetPct>pctElapsed?"ahead":"on track"}]:[]),
      {label:"LAST MONTH",value:fS(prevTotal),sub:"total"}
    ]}/>
  </div>);
}

/* ── Goal Progress Cumulative Area ── */
function GoalProgressChart({D,G,goalId,n,tip,setTip}){
  const t1=G?"#fff":"#1a1a2e",t3=G?"#444":"#bbb";const goal=D.goals.find(g=>g.id===goalId);if(!goal)return null;
  const ms=gMonths(n);
  // Use real funding transactions if they exist, otherwise fall back to linear interpolation
  const fundTxs=D.txs.filter(t=>t.goalId===goalId&&t.type==="fund").sort((a,b)=>a.ts-b.ts);
  const data=ms.map((m,i)=>{
    if(fundTxs.length>0){
      const funded=fundTxs.filter(t=>t.ts<m.end).reduce((s,t)=>s+t.amt,0);
      return{...m,saved:Math.min(funded,goal.saved)};
    }
    const pct=(i+1)/ms.length;return{...m,saved:Math.round(goal.saved*pct)};
  });
  const maxV=Math.max(goal.target,goal.saved,1);
  const W=320,H=180,padL=42,padR=10,padT=12,padB=28,cW=W-padL-padR,cH=H-padT-padB;
  const pts=data.map((d,i)=>`${padL+cW/(data.length-1||1)*i},${padT+cH-(d.saved/maxV)*cH}`).join(" ");
  const area=`${padL},${padT+cH} ${pts} ${padL+cW},${padT+cH}`;
  const tgtY=padT+cH-(goal.target/maxV)*cH;
  const pct=goal.target>0?Math.round(goal.saved/goal.target*100):0;
  const remaining=Math.max(0,goal.target-goal.saved);
  const elapsed=ms.length;
  const perMonth=elapsed>0?goal.saved/elapsed:0;
  const monthsToGo=perMonth>0?Math.ceil(remaining/perMonth):0;
  // Projection dashed line to target
  const projPts=monthsToGo>0&&monthsToGo<=24?[`${padL+cW},${padT+cH-(goal.saved/maxV)*cH}`,`${Math.min(padL+cW+cW/ms.length*monthsToGo,W-padR)},${tgtY}`].join(" "):"";
  return(<div style={{animation:"fu .4s ease"}}>
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
      {[0,.25,.5,.75,1].map(p=>{const y=padT+cH*(1-p);return(<g key={p}><line x1={padL} x2={W-padR} y1={y} y2={y} stroke={G?"rgba(255,255,255,.06)":"rgba(0,0,0,.06)"} strokeDasharray="3,3"/><text x={padL-4} y={y+3} textAnchor="end" style={{fontSize:8,fill:t3}}>{fS(maxV*p)}</text></g>)})}
      <line x1={padL} x2={W-padR} y1={tgtY} y2={tgtY} stroke={goal.color} strokeWidth="1.5" strokeDasharray="6,3" opacity=".6"/>
      <text x={W-padR} y={tgtY-4} textAnchor="end" style={{fontSize:7,fill:goal.color,fontWeight:700}}>Target {fS(goal.target)}</text>
      <polygon points={area} fill={goal.color} opacity="0"><animate attributeName="opacity" from="0" to=".15" dur=".8s" begin=".2s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 0.1 0.25 1"/></polygon>
      <polyline points={pts} fill="none" stroke={goal.color} strokeWidth="2.5" strokeLinecap="round" strokeDasharray="1000" strokeDashoffset="1000"><animate attributeName="stroke-dashoffset" from="1000" to="0" dur="1s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1"/></polyline>
      {projPts&&<polyline points={projPts} fill="none" stroke={goal.color} strokeWidth="1.5" strokeDasharray="4,4" opacity=".4"/>}
      {data.map((d,i)=>{const x=padL+cW/(data.length-1||1)*i;return(<g key={d.mk}><circle cx={x} cy={padT+cH-(d.saved/maxV)*cH} r={dotR(data.length)} fill={goal.color} stroke={G?"#0a0b0f":"#fff"} strokeWidth={dotSW(data.length)} style={{cursor:"pointer",animation:"fi .4s ease .4s both"}} onPointerDown={()=>setTip(`${d.label}: ${fmt(d.saved)} of ${fmt(goal.target)}`)} onPointerLeave={()=>setTip(null)}/><text x={x} y={H-padB+14} textAnchor="middle" style={{fontSize:8,fill:t3}}>{xLabel(i,data.length)?d.labelY||d.label:""}</text></g>)})}
    </svg>
    <StatRow G={G} items={[
      {label:"PROGRESS",value:`${pct}%`,color:pct>=100?A:goal.color,sub:fmt(goal.saved)},
      {label:"REMAINING",value:fS(remaining),color:remaining<=0?A:undefined},
      {label:"PER MONTH",value:fS(perMonth),sub:`${elapsed} months`},
      {label:"ETA",value:remaining<=0?"Done!":monthsToGo>0?`~${monthsToGo} mo`:"—",color:remaining<=0?A:undefined}
    ]}/>
  </div>);
}

/* ── Debt Paydown Declining Area ── */
function DebtPaydownChart({D,G,debtId,n,tip,setTip}){
  const t1=G?"#fff":"#1a1a2e",t3=G?"#444":"#bbb";const debt=(D.debts||[]).find(d=>d.id===debtId);if(!debt)return null;
  const ms=gMonths(n);const payments=D.txs.filter(t=>t.debtId===debtId).sort((a,b)=>a.ts-b.ts);
  // Reconstruct backwards from current balance
  const curBal=debt.balance;
  const rawData=ms.map(m=>{const paid=payments.filter(t=>t.ts>=m.start&&t.ts<m.end).reduce((s,t)=>s+Math.abs(t.amt),0);return{...m,paid}});
  // Walk backwards: current month = curBal, previous = curBal + payments in current month, etc.
  const data=[...rawData];
  let bal=curBal;
  for(let i=data.length-1;i>=0;i--){data[i].bal=Math.max(bal,0);if(i>0)bal+=data[i].paid}
  // First month's balance should reflect payments before the window too
  const maxV=Math.max(...data.map(d=>d.bal),debt.originalAmt||curBal,1);
  const W=320,H=180,padL=42,padR=10,padT=12,padB=28,cW=W-padL-padR,cH=H-padT-padB;
  const pts=data.map((d,i)=>`${padL+cW/(data.length-1||1)*i},${padT+cH-(d.bal/maxV)*cH}`).join(" ");
  const area=`${padL},${padT+cH} ${pts} ${padL+cW},${padT+cH}`;
  const totalPaid=payments.reduce((s,t)=>s+Math.abs(t.amt),0);
  const payMonths=ms.filter(m=>payments.some(t=>t.ts>=m.start&&t.ts<m.end)).length;
  const avgPay=payMonths>0?totalPaid/payMonths:debt.minPayment||0;
  const monthsToPayoff=avgPay>0?Math.ceil(curBal/avgPay):0;
  const paidPct=debt.originalAmt>0?Math.round((debt.originalAmt-curBal)/debt.originalAmt*100):0;
  const monthlyInt=curBal*(debt.rate/100)/12;
  return(<div style={{animation:"fu .4s ease"}}>
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
      {[0,.25,.5,.75,1].map(p=>{const y=padT+cH*(1-p);return(<g key={p}><line x1={padL} x2={W-padR} y1={y} y2={y} stroke={G?"rgba(255,255,255,.06)":"rgba(0,0,0,.06)"} strokeDasharray="3,3"/><text x={padL-4} y={y+3} textAnchor="end" style={{fontSize:8,fill:t3}}>{fS(maxV*p)}</text></g>)})}
      <polygon points={area} fill="#EF4444" opacity="0"><animate attributeName="opacity" from="0" to=".12" dur=".8s" begin=".2s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 0.1 0.25 1"/></polygon>
      <polyline points={pts} fill="none" stroke={debt.color||"#EF4444"} strokeWidth="2.5" strokeLinecap="round" strokeDasharray="1000" strokeDashoffset="1000"><animate attributeName="stroke-dashoffset" from="1000" to="0" dur="1s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1"/></polyline>
      {data.map((d,i)=>{const x=padL+cW/(data.length-1||1)*i;return(<g key={d.mk}><circle cx={x} cy={padT+cH-(d.bal/maxV)*cH} r={dotR(data.length)} fill={debt.color||"#EF4444"} stroke={G?"#0a0b0f":"#fff"} strokeWidth={dotSW(data.length)} style={{cursor:"pointer",animation:"fi .4s ease .4s both"}} onPointerDown={()=>setTip(`${d.label}: ${fmt(d.bal)} left${d.paid>0?` · paid ${fmt(d.paid)}`:""}`)} onPointerLeave={()=>setTip(null)}/><text x={x} y={H-padB+14} textAnchor="middle" style={{fontSize:8,fill:t3}}>{xLabel(i,data.length)?d.labelY||d.label:""}</text></g>)})}
    </svg>
    <StatRow G={G} items={[
      {label:"REMAINING",value:fS(curBal),color:"#EF4444",sub:`${paidPct}% paid off`},
      {label:"TOTAL PAID",value:fS(totalPaid),sub:`${payments.length} payments`},
      {label:"AVG PAYMENT",value:fS(avgPay),sub:"per month"},
      {label:debt.rate>0?"INTEREST":"ETA",value:debt.rate>0?fS(monthlyInt):monthsToPayoff>0?`${monthsToPayoff} mo`:"—",sub:debt.rate>0?`${debt.rate}% APR`:"",color:debt.rate>0?"#F59E0B":undefined}
    ]}/>
  </div>);
}

/* ── Account Balance Line Chart ── */
function AccBalChart({D,G,accountId,n,tip,setTip}){
  const t1=G?"#fff":"#1a1a2e",t3=G?"#444":"#bbb";const acc=(D.accounts||[]).find(a=>a.id===accountId);if(!acc)return null;
  const ms=gMonths(n);
  const data=ms.map(m=>{const txBefore=D.txs.filter(t=>t.accountId===accountId&&t.ts<m.end);const bal=(acc.openingBalance||0)+txBefore.reduce((s,t)=>s+t.amt,0);return{...m,bal}});
  const maxV=Math.max(...data.map(d=>d.bal),1);const minV=Math.min(...data.map(d=>d.bal),0);const range=maxV-minV||1;
  const W=320,H=180,padL=46,padR=10,padT=12,padB=28,cW=W-padL-padR,cH=H-padT-padB;
  const pts=data.map((d,i)=>`${padL+cW/(data.length-1||1)*i},${padT+cH-((d.bal-minV)/range)*cH}`).join(" ");
  const area=`${padL},${padT+cH} ${pts} ${padL+cW},${padT+cH}`;
  const curBal=data[data.length-1]?.bal||0;const prevBal=data[data.length-2]?.bal||0;
  const change=curBal-prevBal;const changePct=prevBal!==0?Math.round(change/Math.abs(prevBal)*100):0;
  const highPt=data.reduce((m,d)=>d.bal>m.bal?d:m,data[0]);
  const lowPt=data.reduce((m,d)=>d.bal<m.bal?d:m,data[0]);
  const avgBal=Math.round(data.reduce((s,d)=>s+d.bal,0)/data.length);
  const lastMonth=ms[ms.length-1];const mTxs=D.txs.filter(t=>t.accountId===accountId&&t.ts>=lastMonth.start&&t.ts<lastMonth.end);
  const mIn=mTxs.filter(t=>t.type==="inc").reduce((s,t)=>s+t.amt,0);const mOut=mTxs.filter(t=>t.type==="exp").reduce((s,t)=>s+Math.abs(t.amt),0);
  return(<div style={{animation:"fu .4s ease"}}>
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
      {[0,.25,.5,.75,1].map(p=>{const y=padT+cH*(1-p);return(<g key={p}><line x1={padL} x2={W-padR} y1={y} y2={y} stroke={G?"rgba(255,255,255,.06)":"rgba(0,0,0,.06)"} strokeDasharray="3,3"/><text x={padL-4} y={y+3} textAnchor="end" style={{fontSize:8,fill:t3}}>{fS(minV+range*p)}</text></g>)})}
      <defs><linearGradient id={`ag${accountId}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={acc.color||A} stopOpacity=".5"/><stop offset="100%" stopColor={acc.color||A} stopOpacity=".05"/></linearGradient></defs>
      <polygon points={area} fill={`url(#ag${accountId})`}><animate attributeName="opacity" from="0" to="1" dur=".8s" begin=".2s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 0.1 0.25 1"/></polygon>
      <polyline points={pts} fill="none" stroke={acc.color||A} strokeWidth="2.5" strokeLinecap="round" strokeDasharray="1000" strokeDashoffset="1000"><animate attributeName="stroke-dashoffset" from="1000" to="0" dur="1s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.22 1 0.36 1"/></polyline>
      {data.map((d,i)=>{const x=padL+cW/(data.length-1||1)*i;const y=padT+cH-((d.bal-minV)/range)*cH;const isHigh=d===highPt&&data.length>2;const isLow=d===lowPt&&data.length>2;return(<g key={d.mk}><circle cx={x} cy={y} r={isHigh||isLow?dotRH(data.length):dotR(data.length)} fill={acc.color||A} stroke={G?"#0a0b0f":"#fff"} strokeWidth={dotSW(data.length)} style={{cursor:"pointer",animation:"fi .4s ease .4s both"}} onPointerDown={()=>setTip(`${d.label}: ${fmt(d.bal)}`)} onPointerLeave={()=>setTip(null)}/>
        {isHigh&&<text x={x} y={y-10} textAnchor="middle" style={{fontSize:6,fill:A,fontWeight:700,animation:"cHighPop .35s ease .7s both"}}>HIGH</text>}
        {isLow&&<text x={x} y={y+14} textAnchor="middle" style={{fontSize:6,fill:"#F59E0B",fontWeight:700,animation:"cHighPop .35s ease .7s both"}}>LOW</text>}
        <text x={x} y={H-padB+14} textAnchor="middle" style={{fontSize:8,fill:t3}}>{xLabel(i,data.length)?d.labelY||d.label:""}</text></g>)})}
    </svg>
    <StatRow G={G} items={[
      {label:"CURRENT",value:fS(curBal),color:acc.color||A,sub:changePct!==0?(change>0?`↑${changePct}%`:`↓${Math.abs(changePct)}%`):"—"},
      {label:"THIS MONTH",value:`+${fS(mIn)} / -${fS(mOut)}`,sub:"in / out"},
      {label:"HIGH",value:fS(highPt.bal),sub:highPt.label},
      {label:"AVERAGE",value:fS(avgBal)}
    ]}/>
  </div>);
}

/* ── Monthly Breakdown Stacked Bar ── */
function MonthlyBreakChart({D,G,n,tip,setTip}){
  const t1=G?"#fff":"#1a1a2e",t3=G?"#444":"#bbb";const ms=gMonths(n);
  const envs=D.envs.filter(e=>e.budget>0);
  const data=ms.map(m=>{const byEnv={};let total=0;envs.forEach(e=>{const s=D.txs.filter(t=>t.ts>=m.start&&t.ts<m.end&&t.eid===e.id&&t.type==="exp").reduce((a,t)=>a+Math.abs(t.amt),0);byEnv[e.id]=s;total+=s});return{...m,byEnv,total}});
  const maxV=Math.max(...data.map(d=>d.total),1);
  const W=320,H=200,padL=42,padR=10,padT=12,padB=28,cW=W-padL-padR,cH=H-padT-padB;
  const barW=Math.min(cW/data.length-4,40);
  const grandTotal=data.reduce((s,d)=>s+d.total,0);
  const avgMonth=grandTotal/Math.max(data.filter(d=>d.total>0).length,1);
  const highMonth=data.reduce((m,d)=>d.total>m.total?d:m,data[0]);
  const topCat=(()=>{const totals={};envs.forEach(e=>{totals[e.id]=data.reduce((s,d)=>s+(d.byEnv[e.id]||0),0)});const top=Object.entries(totals).sort((a,b)=>b[1]-a[1])[0];return envs.find(e=>e.id===top?.[0])?.name||""})();
  if(data.every(d=>d.total===0))return(<div style={{padding:32,textAlign:"center",color:t3,fontSize:13}}>Not enough data yet!</div>);
  return(<div style={{animation:"fu .4s ease"}}>
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
      {[0,.25,.5,.75,1].map(p=>{const y=padT+cH*(1-p);return(<g key={p}><line x1={padL} x2={W-padR} y1={y} y2={y} stroke={G?"rgba(255,255,255,.06)":"rgba(0,0,0,.06)"} strokeDasharray="3,3"/><text x={padL-4} y={y+3} textAnchor="end" style={{fontSize:8,fill:t3}}>{fS(maxV*p)}</text></g>)})}
      {data.map((d,i)=>{const x=padL+(cW/data.length)*i+(cW/data.length-barW)/2;let cum=0;return(<g key={d.mk}>
        {envs.map(e=>{const h=(d.byEnv[e.id]||0)/maxV*cH;const y=padT+cH-cum-h;cum+=h;return h>0?<rect key={e.id} x={x} y={y} width={barW} height={h} fill={e.color} opacity=".75" style={{cursor:"pointer",animation:"fi .4s ease .4s both"}} onPointerDown={()=>setTip(`${d.label} · ${e.name}: ${fmt(d.byEnv[e.id])} · Total: ${fmt(d.total)}`)} onPointerLeave={()=>setTip(null)}/>:null})}
        <text x={x+barW/2} y={H-padB+14} textAnchor="middle" style={{fontSize:8,fill:t3}}>{xLabel(i,data.length)?d.labelY||d.label:""}</text>
        <text x={x+barW/2} y={padT+cH-cum-4} textAnchor="middle" style={{fontSize:7,fill:t3,fontWeight:600}}>{fS(d.total)}</text>
      </g>)})}
    </svg>
    <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:8,fontSize:9,color:t3,flexWrap:"wrap",animation:"cLegendIn .4s ease .5s both"}}>
      {envs.slice(0,6).map(e=>(<span key={e.id} style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:1,background:e.color}}/>{e.name}</span>))}
    </div>
    <StatRow G={G} items={[
      {label:"TOTAL",value:fS(grandTotal),sub:`${data.length} months`},
      {label:"AVERAGE",value:fS(avgMonth),sub:"per month"},
      {label:"HIGHEST",value:fS(highMonth.total),sub:highMonth.label,color:"#EF4444"},
      {label:"TOP CATEGORY",value:topCat||"—"}
    ]}/>
  </div>);
}

/* ── Savings Rate Detail: bars + line ── */
function SavingsDetailChart({D,G,n,tip,setTip}){
  const t1=G?"#fff":"#1a1a2e",t3=G?"#444":"#bbb";
  const data=gByMonth(D.txs,{n}).map(d=>({...d,savings:d.inc-d.exp,rate:d.inc>0?Math.round((d.inc-d.exp)/d.inc*100):0}));
  const maxSav=Math.max(...data.map(d=>Math.abs(d.savings)),1);
  const W=320,H=200,padL=42,padR=30,padT=12,padB=28,cW=W-padL-padR,cH=H-padT-padB;
  const barW=Math.min(cW/data.length-4,36);
  const totalSaved=data.reduce((s,d)=>s+Math.max(0,d.savings),0);
  const avgRate=data.filter(d=>d.inc>0).length>0?Math.round(data.filter(d=>d.inc>0).reduce((s,d)=>s+d.rate,0)/data.filter(d=>d.inc>0).length):0;

function AddTxOv({D,sv,fl,G,rem,setOv,initType,cs,closeOv,ovClosing,ovSwap}){const[pay,setPay]=useState("");const[amt,setAmt]=useState("");const[type,setType]=useState(initType||"exp");const[eid,setEid]=useState(D.envs.find(e=>e.budget>0)?.id||D.envs[0]?.id||"");const[sub,setSub]=useState("");const[note,setNote]=useState("");const[accId,setAccId]=useState(D.accounts?.[0]?.id||"");const selE=D.envs.find(e=>e.id===eid);
  // Suggestions from history
  const payeeCounts={};D.txs.forEach(t=>{const p=t.payee||t.desc;if(p)payeeCounts[p]=(payeeCounts[p]||0)+1});const payeeSugg=Object.entries(payeeCounts).sort((a,b)=>b[1]-a[1]).map(([p])=>p).slice(0,12);
  const noteSugg=[...new Set(D.txs.map(t=>t.note).filter(Boolean))].slice(0,8);
  // Inline validation — warn but don't block over-budget expenses
  const v=parseFloat(amt)||0;const r=rem(eid);const env=D.envs.find(x=>x.id===eid);
  const warn=(()=>{if(v<=0)return null;if(type!=="exp")return null;if(!env||env.budget<=0)return null;if(r<=0)return`Envelope already over by ${fmt(Math.abs(r))}`;if(v>r)return`${fmt(v-r)} over — only ${fmt(r)} left`;return null})();
  const valid=v>0;
  const go=()=>{if(!valid)return;const tx={id:uid(),type,amt:type==="exp"?-v:v,desc:pay||(type==="inc"?"Income":"Expense"),payee:pay,eid:type==="exp"?eid:"_inc",subcat:type==="exp"?sub:"",note:note.trim(),accountId:accId||"",ts:Date.now()};let next={...D,txs:[tx,...D.txs]};if(type==="inc")next.unal=(next.unal||0)+v;sv(next);fl(type==="inc"?"Added":"Recorded");closeOv()};
  return (<Ov title="Add Transaction" onClose={closeOv} closing={ovClosing} ovSwap={ovSwap} G={G}>
    <div style={{display:"flex",marginBottom:14,borderRadius:8,overflow:"hidden",border:`1px solid ${G?"rgba(255,255,255,.1)":"#ddd"}`}}>{[["exp","Expense"],["inc","Income"]].map(([k,l])=>(<button key={k} onClick={()=>setType(k)} style={{flex:1,padding:10,border:"none",fontFamily:F2,fontSize:13,fontWeight:600,cursor:"pointer",background:type===k?A:(G?"#1a1a2a":"#fff"),color:type===k?"#0a0b0f":(G?"#888":"#666"),...cT}}>{l}</button>))}</div>
    <Lbl G={G}>Payee</Lbl><TxtIn value={pay} onChange={setPay} G={G} placeholder="e.g. Checkers..." label="PAYEE" suggestions={payeeSugg}/>

    {cs("multiAccount")&&D.accounts?.length>0&&<div><Lbl G={G}>Account</Lbl><div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:14}}>{D.accounts.map(acc=>(<button key={acc.id} onClick={()=>setAccId(acc.id)} style={{padding:"5px 10px",borderRadius:6,border:`1px solid ${accId===acc.id?A:(G?"rgba(255,255,255,.1)":"#ddd")}`,background:accId===acc.id?`${A}15`:(G?"#1a1a2a":"#fff"),color:accId===acc.id?A:(G?"#888":"#666"),fontSize:11,fontFamily:F2,cursor:"pointer",display:"flex",alignItems:"center",gap:4,...cT}}><span style={{fontSize:12}}>{acc.icon||"🏦"}</span>{acc.name}</button>))}</div></div>}
    <Morph show={type==="exp"} maxH={350}><div><Lbl G={G}>Envelope</Lbl><div style={{maxHeight:150,overflowY:"auto",marginBottom:10,border:`1px solid ${G?"rgba(255,255,255,.1)":"#ddd"}`,borderRadius:8}}>

  </Ov>);

function EditTxOv({D,sv,fl,G,rem,ov,setOv,cs,closeOv,ovClosing,ovSwap}){
  const tx=D.txs.find(t=>t.id===ov?.txId);
  const[pay,setPay]=useState(tx?.payee||tx?.desc||"");
  const[amt,setAmt]=useState(tx?String(Math.abs(tx.amt)):"");
  const[type,setType]=useState(tx?.type||"exp");
  const[eid,setEid]=useState(tx?.eid||D.envs[0]?.id||"");
  const[sub,setSub]=useState(tx?.subcat||"");
  const[date,setDate]=useState(tx?new Date(tx.ts).toISOString().slice(0,10):"");
  const[note,setNote]=useState(tx?.note||"");
  const[accId,setAccId]=useState(tx?.accountId||D.accounts?.[0]?.id||"");
  const[confirmDel,setConfirmDel]=useState(false);
  const payeeCounts={};D.txs.forEach(t=>{const p=t.payee||t.desc;if(p)payeeCounts[p]=(payeeCounts[p]||0)+1});const payeeSugg=Object.entries(payeeCounts).sort((a,b)=>b[1]-a[1]).map(([p])=>p).slice(0,12);
  const noteSugg=[...new Set(D.txs.map(t=>t.note).filter(Boolean))].slice(0,8);
  if(!tx)return null;
  if(tx.splitGroup)return null;
  if(tx.debtId)return null;
  const selE=D.envs.find(e=>e.id===eid);
  // Inline validation — warn but don't block over-budget
  const v=parseFloat(amt)||0;
  const dateTs=date?new Date(date+"T12:00:00").getTime():tx.ts;
  const warn=(()=>{if(v<=0)return null;if(type!=="exp")return null;const env=D.envs.find(x=>x.id===eid);if(!env||env.budget<=0)return null;const inCurMonth=dateTs>=periodStart("month");if(!inCurMonth)return null;const curMonthOther=filterTxByPeriod(D.txs,"month").filter(t=>t.id!==tx.id&&t.eid===eid&&t.type==="exp").reduce((s,t)=>s+Math.abs(t.amt),0);const avail=env.budget+(env.rollover||0)-curMonthOther;if(avail<=0)return`Envelope already over by ${fmt(Math.abs(avail))}`;if(v>avail)return`${fmt(v-avail)} over — only ${fmt(avail)} left`;return null})();
  const valid=v>0;
  const save=()=>{
    if(!valid)return;
    const updated={...tx,payee:pay||(type==="inc"?"Income":"Expense"),desc:pay||(type==="inc"?"Income":"Expense"),amt:type==="exp"?-v:v,type,eid:type==="exp"?eid:"_inc",subcat:type==="exp"?sub:"",note:note.trim(),accountId:accId||"",ts:dateTs};
    let next={...D,txs:D.txs.map(t=>t.id===tx.id?updated:t)};
    if(tx.type==="inc"&&type==="exp"){next.unal=(next.unal||0)-Math.abs(tx.amt)}
    else if(tx.type==="exp"&&type==="inc"){next.unal=(next.unal||0)+v}
    else if(tx.type==="inc"&&type==="inc"&&v!==Math.abs(tx.amt)){next.unal=(next.unal||0)+(v-Math.abs(tx.amt))}
    sv(next);fl("Updated");closeOv();
  };
  const del=()=>{
    let next={...D,txs:D.txs.filter(t=>t.id!==tx.id)};
    if(tx.type==="inc"){next.unal=(next.unal||0)-Math.abs(tx.amt)}
    sv(next);fl("Deleted");closeOv();
  };
  return (<Ov title="Edit Transaction" onClose={closeOv} closing={ovClosing} ovSwap={ovSwap} G={G}>
    <div style={{display:"flex",marginBottom:14,borderRadius:8,overflow:"hidden",border:`1px solid ${G?"rgba(255,255,255,.1)":"#ddd"}`}}>{[["exp","Expense"],["inc","Income"]].map(([k,l])=>(<button key={k} onClick={()=>setType(k)} style={{flex:1,padding:10,border:"none",fontFamily:F2,fontSize:13,fontWeight:600,cursor:"pointer",background:type===k?A:(G?"#1a1a2a":"#fff"),color:type===k?"#0a0b0f":(G?"#888":"#666"),...cT}}>{l}</button>))}</div>
    <Lbl G={G}>Payee</Lbl><TxtIn value={pay} onChange={setPay} G={G} placeholder="e.g. Checkers..." label="PAYEE" suggestions={payeeSugg}/>
    <Lbl G={G}>Amount</Lbl><div style={{marginBottom:14}}><AmtIn value={amt} onChange={setAmt} G={G}/></div>
    <Morph show={!!warn} maxH={50} ms={200}><div style={{fontSize:11,color:"#F59E0B",fontWeight:600,marginBottom:14,padding:"4px 0",display:"flex",alignItems:"center",gap:4}}><span>⚠</span>{warn}</div></Morph>
    {cs&&cs("notes")&&<><Lbl G={G}>Date</Lbl><DatePick value={date} onChange={setDate} G={G}/></>}
    {cs&&cs("multiAccount")&&D.accounts?.length>0&&<div><Lbl G={G}>Account</Lbl><div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:14}}>{D.accounts.map(acc=>(<button key={acc.id} onClick={()=>setAccId(acc.id)} style={{padding:"5px 10px",borderRadius:6,border:`1px solid ${accId===acc.id?A:(G?"rgba(255,255,255,.1)":"#ddd")}`,background:accId===acc.id?`${A}15`:(G?"#1a1a2a":"#fff"),color:accId===acc.id?A:(G?"#888":"#666"),fontSize:11,fontFamily:F2,cursor:"pointer",display:"flex",alignItems:"center",gap:4,...cT}}><span style={{fontSize:12}}>{acc.icon||"🏦"}</span>{acc.name}</button>))}</div></div>}
    <Morph show={type==="exp"} maxH={350}><div><Lbl G={G}>Envelope</Lbl><div style={{maxHeight:150,overflowY:"auto",marginBottom:10,border:`1px solid ${G?"rgba(255,255,255,.1)":"#ddd"}`,borderRadius:8}}>
      {D.envs.map(env=>{const r=rem(env.id);return (<button key={env.id} onClick={()=>{setEid(env.id);setSub("")}} style={{display:"flex",width:"100%",alignItems:"center",gap:8,padding:"9px 12px",background:eid===env.id?`${A}15`:(G?"#1a1a2a":"#fff"),border:"none",borderBottom:`1px solid ${G?"rgba(255,255,255,.04)":"#f0f0f0"}`,cursor:"pointer",fontFamily:F2,...cT}}><div style={{width:8,height:8,borderRadius:2,background:env.color}}/><span style={{flex:1,textAlign:"left",fontSize:13,color:G?"#fff":"#1a1a2e",fontWeight:eid===env.id?700:400}}>{env.name}</span>{env.budget>0&&<span style={{fontSize:11,color:G?"#444":"#bbb"}}>[{fmt(r)} left]</span>}</button>)})}</div>
      {cs&&cs("notes")&&selE?.subcats?.length>0&&<div><Lbl G={G}>Subcategory</Lbl><div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>{selE.subcats.map(sc=>(<button key={sc} onClick={()=>setSub(sc===sub?"":sc)} style={{padding:"5px 10px",borderRadius:6,border:`1px solid ${sub===sc?A:(G?"rgba(255,255,255,.1)":"#ddd")}`,background:sub===sc?`${A}15`:(G?"#1a1a2a":"#fff"),color:sub===sc?A:(G?"#888":"#666"),fontSize:12,fontFamily:F2,cursor:"pointer",...cT}}>{sc}</button>))}</div></div>}
    </div></Morph>

    {cs&&cs("deleteTx")&&<><Morph show={!confirmDel} maxH={60}><button onClick={()=>setConfirmDel(true)} style={{width:"100%",padding:"10px",borderRadius:10,border:`1px solid ${G?"rgba(239,68,68,.3)":"rgba(239,68,68,.2)"}`,background:"transparent",fontSize:13,fontWeight:600,fontFamily:F2,color:"#EF4444",cursor:"pointer",...cT}}>Delete Transaction</button></Morph>

function SplitTxOv({D,sv,fl,G,rem,ov,setOv,closeOv,ovClosing,ovSwap}){
  const editGroup=ov?.splitGroup;
  const existing=editGroup?D.txs.filter(t=>t.splitGroup===editGroup):[];
  const[pay,setPay]=useState(ov?.initPay||existing[0]?.payee||"");
  const[total,setTotal]=useState(ov?.initAmt||(existing.length>0?String(existing.reduce((s,t)=>s+Math.abs(t.amt),0)):""));
  const[accId,setAccId]=useState(existing[0]?.accountId||D.accounts?.[0]?.id||"");
  const[splits,setSplits]=useState(()=>{
    if(existing.length>0)return existing.map(t=>({id:t.id,eid:t.eid,sub:t.subcat||"",amt:String(Math.abs(t.amt)),note:t.note||""}));
    const first=D.envs.find(e=>e.budget>0)?.id||D.envs[0]?.id||"";const initN=ov?.initNote||"";
    return[{id:uid(),eid:first,sub:"",amt:"",note:initN},{id:uid(),eid:D.envs[1]?.id||first,sub:"",amt:"",note:""}];
  });
  const[confirmDel,setConfirmDel]=useState(false);
  const t1=G?"#fff":"#1a1a2e",t2=G?"#888":"#777",t3=G?"#444":"#bbb";
  const tot=parseFloat(total)||0;
  const allocated=splits.reduce((s,sp)=>s+(parseFloat(sp.amt)||0),0);
  const diff=tot-allocated;
  // Validation — when editing, exclude this split group's existing spending from rem check
  // Also account for sibling split lines targeting the same envelope
  const errs=splits.map((sp,idx)=>{const v=parseFloat(sp.amt)||0;if(v<=0)return null;const env=D.envs.find(x=>x.id===sp.eid);if(!env||env.budget<=0)return null;
    const eff=env.budget+(env.rollover||0);
    const curOther=filterTxByPeriod(D.txs,"month").filter(t=>t.eid===sp.eid&&t.type==="exp"&&(!editGroup||t.splitGroup!==editGroup)).reduce((s,t)=>s+Math.abs(t.amt),0);
    const siblingAlloc=splits.reduce((s,other,j)=>j<idx&&other.eid===sp.eid?s+(parseFloat(other.amt)||0):s,0);
    const avail=eff-curOther-siblingAlloc;
    if(avail<=0)return"Over budget";if(v>avail)return`Max ${fmt(avail)}`;return null});
  const allValid=tot>0&&Math.abs(diff)<0.01&&splits.every((sp,i)=>(parseFloat(sp.amt)||0)>0&&!errs[i]);
  const addSplit=()=>setSplits([...splits,{id:uid(),eid:D.envs[0]?.id||"",sub:"",amt:"",note:""}]);
  const rmSplit=idx=>{if(splits.length<=2)return;setSplits(splits.filter((_,i)=>i!==idx))};
  const upSplit=(idx,key,val)=>setSplits(splits.map((sp,i)=>i===idx?{...sp,[key]:val}:sp));
  const save=()=>{
    if(!allValid)return;
    const sg=editGroup||uid();const ts=Date.now();
    const newTxs=splits.map(sp=>({id:editGroup?sp.id:uid(),type:"exp",amt:-Math.abs(parseFloat(sp.amt)),desc:pay||"Split",payee:pay||"Split",eid:sp.eid,subcat:sp.sub,note:(sp.note||"").trim(),accountId:accId||"",ts:existing.length>0?existing[0].ts:ts,splitGroup:sg}));
    let next={...D};
    if(editGroup){
      const oldTotal=existing.reduce((s,t)=>s+t.amt,0);const newTotal=newTxs.reduce((s,t)=>s+t.amt,0);
      next.txs=D.txs.filter(t=>t.splitGroup!==editGroup).concat(newTxs);
    }else{
      next.txs=[...newTxs,...D.txs];
    }
    sv(next);fl(editGroup?"Split updated":"Split recorded");closeOv();
  };
  const del=()=>{
    if(!editGroup)return;
    let next={...D,txs:D.txs.filter(t=>t.splitGroup!==editGroup)};
    sv(next);fl("Split deleted");closeOv();
  };
  return (<Ov title={editGroup?"Edit Split":"Split Transaction"} onClose={closeOv} closing={ovClosing} ovSwap={ovSwap} G={G}>
    <Lbl G={G}>Payee</Lbl><TxtIn value={pay} onChange={setPay} G={G} placeholder="e.g. Checkers..." label="PAYEE" suggestions={[...new Set(D.txs.map(t=>t.payee||t.desc).filter(Boolean))].slice(0,12)}/>
    <Lbl G={G}>Total Amount</Lbl><div style={{marginBottom:14}}><AmtIn value={total} onChange={setTotal} G={G}/></div>
    {D.accounts?.length>0&&<div><Lbl G={G}>Account</Lbl><div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:14}}>{D.accounts.map(acc=>(<button key={acc.id} onClick={()=>setAccId(acc.id)} style={{padding:"5px 10px",borderRadius:6,border:`1px solid ${accId===acc.id?A:(G?"rgba(255,255,255,.1)":"#ddd")}`,background:accId===acc.id?`${A}15`:(G?"#1a1a2a":"#fff"),color:accId===acc.id?A:(G?"#888":"#666"),fontSize:11,fontFamily:F2,cursor:"pointer",display:"flex",alignItems:"center",gap:4,...cT}}><span style={{fontSize:12}}>{acc.icon||"🏦"}</span>{acc.name}</button>))}</div></div>}
    {/* Split lines */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <Lbl G={G}>Split Lines</Lbl>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <span style={{fontSize:11,fontWeight:700,color:Math.abs(diff)<0.01?A:diff>0?"#F59E0B":"#EF4444"}}>{Math.abs(diff)<0.01?"✓ Balanced":diff>0?`${fmt(diff)} left`:`${fmt(Math.abs(diff))} over`}</span>
      </div>
    </div>
    <div style={{maxHeight:"40vh",overflowY:"auto",marginBottom:12}}>
      {splits.map((sp,i)=>{const env=D.envs.find(e=>e.id===sp.eid);return(
        <div key={sp.id} style={{padding:"10px 0",borderBottom:i<splits.length-1?`1px solid ${G?"rgba(255,255,255,.04)":"rgba(0,0,0,.04)"}`:undefined}}>
          <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
            <div style={{width:8,height:8,borderRadius:2,background:env?.color||"#666",flexShrink:0}}/>
            <EnvPick value={sp.eid} onChange={v=>upSplit(i,"eid",v)} envs={D.envs} G={G}/>
            <div style={{display:"flex",alignItems:"center",gap:2,flexShrink:0}}><span style={{fontSize:11,color:t3}}>R</span><input type="number" value={sp.amt} onChange={e=>upSplit(i,"amt",e.target.value)} placeholder="0" style={{width:70,padding:"6px 8px",borderRadius:6,border:`1px solid ${errs[i]?"#EF4444":(G?"rgba(255,255,255,.1)":"#ddd")}`,background:G?"rgba(255,255,255,.05)":"#fff",color:G?"#fff":"#1a1a2e",fontSize:13,fontFamily:F2,fontWeight:600,textAlign:"right"}}/></div>
            {splits.length>2&&<button onClick={()=>rmSplit(i)} style={{background:"none",border:"none",color:t3,cursor:"pointer",fontSize:14,flexShrink:0,...lT}}>×</button>}
          </div>
          {errs[i]&&<div style={{fontSize:10,color:"#EF4444",fontWeight:600,marginLeft:14}}>⚠ {errs[i]}</div>}
          {env?.subcats?.length>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginLeft:14,marginTop:4}}>
            {env.subcats.map(sc=>(<button key={sc} onClick={()=>upSplit(i,"sub",sc===sp.sub?"":sc)} style={{padding:"2px 7px",borderRadius:4,border:`1px solid ${sp.sub===sc?A:(G?"rgba(255,255,255,.06)":"rgba(0,0,0,.06)")}`,background:sp.sub===sc?`${A}15`:"transparent",color:sp.sub===sc?A:(G?"#666":"#999"),fontSize:9,fontFamily:F2,cursor:"pointer",...cT}}>{sc}</button>))}
          </div>}
          <input type="text" enterKeyHint="done" value={sp.note||""} onChange={e=>upSplit(i,"note",e.target.value)} placeholder="Note..." style={{marginLeft:14,marginTop:4,width:"calc(100% - 14px)",padding:"4px 8px",border:`1px solid ${G?"rgba(255,255,255,.06)":"rgba(0,0,0,.06)"}`,borderRadius:4,fontSize:10,fontFamily:F2,color:G?"#ccc":"#666",background:G?"rgba(255,255,255,.03)":"rgba(0,0,0,.02)",outline:"none"}}/>
        </div>
      )})}
    </div>
    <button onClick={addSplit} style={{width:"100%",padding:"8px",borderRadius:8,border:`1px dashed ${G?"rgba(255,255,255,.12)":"rgba(0,0,0,.12)"}`,background:"transparent",color:t2,fontSize:11,fontWeight:600,fontFamily:F2,cursor:"pointer",marginBottom:12,...cT}}>+ Add Split Line</button>
    <button onClick={save} disabled={!allValid} style={{...pb(),background:A,opacity:allValid?1:.4,marginBottom:editGroup?8:0}}>{editGroup?"Save Split":"Record Split"}</button>
    {editGroup&&<><Morph show={!confirmDel} maxH={60}><button onClick={()=>setConfirmDel(true)} style={{width:"100%",padding:"10px",borderRadius:10,border:`1px solid ${G?"rgba(239,68,68,.3)":"rgba(239,68,68,.2)"}`,background:"transparent",fontSize:13,fontWeight:600,fontFamily:F2,color:"#EF4444",cursor:"pointer",...cT}}>Delete All Splits</button></Morph>
    <Morph show={confirmDel} maxH={60}><div style={{display:"flex",gap:8}}><button onClick={()=>setConfirmDel(false)} style={{flex:1,padding:"10px",borderRadius:10,border:`1px solid ${G?"#333":"#ddd"}`,background:"transparent",fontSize:13,fontWeight:600,fontFamily:F2,color:G?"#888":"#666",cursor:"pointer",...cT}}>Cancel</button><button onClick={del} style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:"#EF4444",fontSize:13,fontWeight:700,fontFamily:F2,color:"#fff",cursor:"pointer",...cT}}>Confirm</button></div></Morph></>}
  </Ov>);
}

function FillOv({D,sv,fl,G,setOv,closeOv,ovClosing,ovSwap}){const[src,setSrc]=useState(D.unal>0?"unal":"new");const[amt,setAmt]=useState(src==="unal"?String(D.unal):"");const[step,setStep]=useState(src==="unal"?2:1);const[al,setAl]=useState({});const[rf,setRf]=useState("");const[accId,setAccId]=useState(D.accounts?.[0]?.id||"");
  const total=parseFloat(amt)||0;const alloc=Object.values(al).reduce((s,v)=>s+(parseFloat(v)||0),0);const remn=total-alloc;
  const go=()=>{if(total<=0||alloc>total)return;let next={...D,envs:D.envs.map(e=>({...e}))};if(src==="new"){next.txs=[{id:uid(),type:"inc",amt:total,desc:rf||"Income",payee:rf||"Income",eid:"_inc",accountId:accId||"",ts:Date.now()},...next.txs];next.unal=(next.unal||0)+total-alloc}else{next.unal=D.unal-alloc}next.envs=next.envs.map(e=>{const a=parseFloat(al[e.id])||0;return a>0?{...e,budget:e.budget+a}:e});sv(next);fl("Filled!");closeOv()};
  return (<Ov title="Fill Envelopes" onClose={closeOv} closing={ovClosing} ovSwap={ovSwap} G={G}>
    <div style={{display:"flex",marginBottom:14,borderRadius:8,overflow:"hidden",border:`1px solid ${G?"rgba(255,255,255,.1)":"#ddd"}`}}>
      <button onClick={()=>{setSrc("new");setStep(1);setAmt("")}} style={{flex:1,padding:9,border:"none",fontFamily:F2,fontSize:10,fontWeight:700,letterSpacing:.5,cursor:"pointer",background:src==="new"?A:(G?"#1a1a2a":"#fff"),color:src==="new"?"#0a0b0f":(G?"#888":"#666"),...cT}}>NEW INCOME</button>
      <button onClick={()=>{setSrc("unal");setStep(2);setAmt(String(D.unal))}} style={{flex:1,padding:9,border:"none",fontFamily:F2,fontSize:10,fontWeight:700,letterSpacing:.5,cursor:"pointer",background:src==="unal"?"#F59E0B":(G?"#1a1a2a":"#fff"),color:src==="unal"?"#0a0b0f":(G?"#888":"#666"),...cT}}>UNALLOCATED</button></div>
    <Morph show={step===1} maxH={700}><Lbl G={G}>From</Lbl><input type="text" enterKeyHint="done" value={rf} onChange={e=>setRf(e.target.value)} placeholder="e.g. Paycheck" style={si(G)}/><Lbl G={G}>Amount</Lbl><div style={{marginBottom:14}}><AmtIn value={amt} onChange={setAmt} G={G}/></div>
      {D.accounts?.length>0&&<div><Lbl G={G}>Into Account</Lbl><div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:14}}>{D.accounts.map(acc=>(<button key={acc.id} onClick={()=>setAccId(acc.id)} style={{padding:"5px 10px",borderRadius:6,border:`1px solid ${accId===acc.id?A:(G?"rgba(255,255,255,.1)":"#ddd")}`,background:accId===acc.id?`${A}15`:(G?"#1a1a2a":"#fff"),color:accId===acc.id?A:(G?"#888":"#666"),fontSize:11,fontFamily:F2,cursor:"pointer",display:"flex",alignItems:"center",gap:4,...cT}}><span style={{fontSize:12}}>{acc.icon||"🏦"}</span>{acc.name}</button>))}</div></div>}
      <button onClick={()=>{if(total>0)setStep(2)}} disabled={total<=0} style={{...pb(),background:A,opacity:total<=0?.4:1}}>Allocate →</button></Morph>
    <Morph show={step===2} maxH={600}><div style={{textAlign:"center",marginBottom:12}}><div style={{fontSize:20,fontWeight:700,fontFamily:F,color:A}}>{fmt(total)}</div><div style={{fontSize:12,fontWeight:600,marginTop:4,color:remn>0?"#F59E0B":remn===0?A:"#EF4444"}}>{remn>0?`${fmt(remn)} left`:remn===0?"Allocated ✓":"Over!"}</div></div>
      <button onClick={()=>{const budgeted=D.envs.filter(e=>e.budget>0);const totalBudget=budgeted.reduce((s,e)=>s+e.budget,0);if(totalBudget<=0)return;const newAl={};budgeted.forEach((e,i)=>{if(i<budgeted.length-1){newAl[e.id]=String(Math.round((e.budget/totalBudget)*total*100)/100)}else{const prev=Object.values(newAl).reduce((s,v)=>s+(parseFloat(v)||0),0);newAl[e.id]=String(Math.round((total-prev)*100)/100)}});setAl(newAl)}} style={{width:"100%",padding:"8px",borderRadius:8,border:`1px dashed ${A}55`,background:`${A}08`,color:A,fontSize:11,fontWeight:700,fontFamily:F2,cursor:"pointer",marginBottom:10,letterSpacing:.3,...cT}}>⚡ Auto-fill by budget ratio</button>
      <div style={{maxHeight:250,overflowY:"auto",marginBottom:14}}>{D.envs.map(env=>(<div key={env.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:`1px solid ${G?"rgba(255,255,255,.04)":"#f0f0f0"}`}}><div style={{width:8,height:8,borderRadius:2,background:env.color}}/><div style={{flex:1}}><div style={{fontSize:13,color:G?"#fff":"#1a1a2e"}}>{env.name}</div>{env.budget>0&&<div style={{fontSize:9,color:G?"#555":"#aaa"}}>Budget: {fmt(env.budget)}</div>}</div><div style={{display:"flex",alignItems:"center",gap:2}}><span style={{fontSize:11,color:G?"#444":"#bbb"}}>R</span><input type="number" value={al[env.id]||""} onChange={e=>setAl({...al,[env.id]:e.target.value})} placeholder="0" style={{...si(G),width:70,marginBottom:0,padding:"5px 8px",textAlign:"right",fontWeight:600}}/></div></div>))}</div>
      <button onClick={go} disabled={alloc>total||total<=0} style={{...pb(),background:A,opacity:(alloc>total||total<=0)?.4:1}}>✓ Confirm</button>
      {src==="new"&&<button onClick={()=>setStep(1)} style={{background:"none",border:"none",color:A,fontSize:12,fontFamily:F2,cursor:"pointer",display:"block",margin:"8px auto 0",...lT}}>← Back</button>}</Morph>
  </Ov>);
}

function XferOv({D,sv,fl,G,rem,setOv,closeOv,ovClosing,ovSwap}){const[from,setFrom]=useState("");const[to,setTo]=useState("");const[amt,setAmt]=useState("");
  // cap = the amount transferable OUT of this source: remaining budget (not full budget) for envelopes, D.unal for unallocated.
  const srcs=[...D.envs.filter(e=>e.budget>0||(e.rollover||0)>0).map(e=>{const r=rem(e.id);return{id:e.id,name:e.name,cap:Math.max(0,r),rem:r,color:e.color}}),{id:"_u",name:"Unallocated",cap:Math.max(0,D.unal||0),rem:D.unal||0,color:"#F59E0B"}];
  const v=parseFloat(amt)||0;const s=srcs.find(x=>x.id===from);
  const xErr=(()=>{if(!from||!to||v<=0)return null;if(from===to)return"Can't transfer to same envelope";if(!s)return null;if(s.cap<=0)return"Nothing available to transfer";if(v>s.cap)return`${fmt(v-s.cap)} over — max ${fmt(s.cap)}`;return null})();
  const xValid=v>0&&from&&to&&from!==to&&!xErr;
  const go=()=>{if(!xValid)return;let next={...D,envs:D.envs.map(e=>({...e}))};if(from==="_u")next.unal=(next.unal||0)-v;else next.envs.find(x=>x.id===from).budget-=v;if(to==="_u")next.unal=(next.unal||0)+v;else next.envs.find(x=>x.id===to).budget+=v;sv(next);fl("Done!");closeOv()};
  return (<Ov title="Transfer" onClose={closeOv} closing={ovClosing} ovSwap={ovSwap} G={G}><Lbl G={G}>From</Lbl><div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:12}}>{srcs.filter(s=>s.id!==to).map(s=>(<button key={s.id} onClick={()=>setFrom(s.id)} style={{display:"flex",width:"100%",justifyContent:"space-between",alignItems:"center",padding:"9px 12px",background:from===s.id?`${s.color}15`:(G?"#1a1a2a":"#fff"),border:`1px solid ${from===s.id?s.color:(G?"rgba(255,255,255,.06)":"#eee")}`,borderRadius:6,cursor:"pointer",fontFamily:F2,...cT}}><span style={{fontSize:13,color:G?"#fff":"#1a1a2e"}}>{s.name}</span><div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:1}}><span style={{fontSize:12,fontWeight:700,color:G?"#fff":"#1a1a2e"}}>{fmt(s.cap)}</span>{s.id!=="_u"&&s.rem<0&&<span style={{fontSize:9,color:"#EF4444",fontWeight:700,letterSpacing:.3,...cT}}>over {fmt(Math.abs(s.rem))}</span>}{s.cap>0&&<span style={{fontSize:9,color:G?"#666":"#999"}}>available</span>}</div></button>))}</div>
    <Lbl G={G}>To</Lbl><div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:12}}>{srcs.filter(s=>s.id!==from).map(s=>(<button key={s.id} onClick={()=>setTo(s.id)} style={{display:"flex",width:"100%",padding:"9px 12px",background:to===s.id?`${s.color}15`:(G?"#1a1a2a":"#fff"),border:`1px solid ${to===s.id?s.color:(G?"rgba(255,255,255,.06)":"#eee")}`,borderRadius:6,cursor:"pointer",fontFamily:F2,...cT}}><span style={{fontSize:13,color:G?"#fff":"#1a1a2e"}}>{s.name}</span></button>))}</div>
    <Morph show={!!(from&&to)} maxH={700}><Lbl G={G}>Amount</Lbl><div style={{marginBottom:14}}><AmtIn value={amt} onChange={setAmt} G={G}/></div>
      <Morph show={!!xErr} maxH={50} ms={200}><div style={{fontSize:11,color:"#EF4444",fontWeight:600,marginBottom:14,padding:"4px 0",display:"flex",alignItems:"center",gap:4}}><span>⚠</span>{xErr}</div></Morph>
      <button onClick={go} disabled={!xValid} style={{...pb(),background:A2,opacity:xValid?1:.4}}>Transfer</button></Morph>
  </Ov>);
}

function ImportOv({D,sv,fl,G,setOv,closeOv,ovClosing,ovSwap}){
  const[step,setStep]=useState(1);
  const[raw,setRaw]=useState("");
  const[rows,setRows]=useState([]);
  const[headers,setHeaders]=useState([]);
  const[dateCol,setDateCol]=useState(0);
  const[descCol,setDescCol]=useState(1);
  const[amtCol,setAmtCol]=useState(2);
  const[accId,setAccId]=useState(D.accounts?.[0]?.id||"");
  const[parsed,setParsed]=useState([]);
  const[envMap,setEnvMap]=useState({});
  const[parseWarns,setParseWarns]=useState({skipped:0,dateFallback:0,dupes:0});
  const t1=G?"#fff":"#1a1a2e",t3=G?"#444":"#bbb";
  const loadFile=(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=(ev)=>{const txt=ev.target.result;setRaw(txt);
    const lines=txt.split(/\r?\n/).filter(l=>l.trim());if(lines.length<2){fl("File too short",true);return}
    // Detect delimiter from header line only (not full file)
    const headerLine=lines[0];
    const semiCount=(headerLine.match(/;/g)||[]).length;const commaCount=(headerLine.match(/,/g)||[]).length;
    const delim=semiCount>commaCount?";":",";
    const hdr=headerLine.split(delim).map(h=>h.replace(/^"|"$/g,"").trim());setHeaders(hdr);
    const dataRows=lines.slice(1).map(l=>{const cells=[];let cur="",inQ=false;for(let i=0;i<l.length;i++){const c=l[i];if(c==='"')inQ=!inQ;else if(c===delim&&!inQ){cells.push(cur.trim());cur=""}else cur+=c}cells.push(cur.trim());return cells.map(c=>c.replace(/^"|"$/g,""))});
    setRows(dataRows);
    // Auto-detect columns
    const di=hdr.findIndex(h=>/date|datum/i.test(h));const ai=hdr.findIndex(h=>/amount|amt|bedrag|value/i.test(h));const ni=hdr.findIndex(h=>/desc|payee|narr|omskr|detail/i.test(h));
    if(di>=0)setDateCol(di);if(ni>=0)setDescCol(ni);else if(di>=0)setDescCol(di===0?1:0);if(ai>=0)setAmtCol(ai);
    setStep(2)};r.readAsText(f)};
  // Parse amount handling European formats: "1 234,56" or "1.234,56" or "1,234.56" or "-R1 234.56"
  const parseAmt=(raw)=>{
    let s=(raw||"").replace(/[^\d.,\-\s]/g,"").trim();
    if(!s)return NaN;
    const neg=s.startsWith("-");s=s.replace(/^-/,"").trim();
    // Detect format: if last separator is comma and has 1-2 digits after → comma is decimal
    const lastComma=s.lastIndexOf(",");const lastDot=s.lastIndexOf(".");
    if(lastComma>lastDot){
      // "1.234,56" or "1234,56" → comma is decimal
      s=s.replace(/\./g,"").replace(",",".");
    } else if(lastDot>lastComma){
      // "1,234.56" or "1234.56" → dot is decimal
      s=s.replace(/,/g,"");
    } else {
      // Only one type of separator or none
      s=s.replace(/\s/g,"").replace(",",".");
    }
    s=s.replace(/\s/g,"");
    const v=parseFloat(s);return isNaN(v)?NaN:(neg?-v:v);
  };
  const doParse=()=>{
    let skipped=0,dateFallback=0,dupes=0;
    const txs=rows.map(r=>{const dateStr=r[dateCol]||"";const desc=(r[descCol]||"").trim();const amt=parseAmt(r[amtCol]);
      if(!desc||isNaN(amt)){skipped++;return null}
      let ts;try{const parts=dateStr.split(/[-/]/);if(parts.length===3){const[a,b,c]=parts;ts=a.length===4?new Date(`${a}-${b.padStart(2,"0")}-${c.padStart(2,"0")}T12:00:00`).getTime():new Date(`${c.length===2?"20"+c:c}-${b.padStart(2,"0")}-${a.padStart(2,"0")}T12:00:00`).getTime()}}catch{}
      if(!ts||isNaN(ts)){ts=Date.now();dateFallback++}
      // Duplicate detection: check existing txs for same date+amount+payee
      const isDup=D.txs.some(t=>Math.abs(t.ts-ts)<864e5&&Math.abs(Math.abs(t.amt)-Math.abs(amt))<0.01&&(t.payee||t.desc)===desc);
      if(isDup)dupes++;
      const type=amt>=0?"inc":"exp";
      // Auto-match envelope by keyword
      const dl=desc.toLowerCase();let eid=type==="inc"?"_inc":"";
      if(type==="exp"){for(const env of D.envs){if(env.subcats?.some(sc=>dl.includes(sc.toLowerCase()))){eid=env.id;break}if(dl.includes(env.name.toLowerCase())){eid=env.id;break}}}
      return{id:uid(),type,amt:type==="exp"?-Math.abs(amt):Math.abs(amt),desc,payee:desc,eid,subcat:"",note:"Imported",accountId:accId||"",ts,_isDup:isDup};
    }).filter(Boolean);
    setParseWarns({skipped,dateFallback,dupes});
    setParsed(txs);setStep(3)};
  const doImport=()=>{
    if(parsed.length===0)return;
    const final=parsed.map(tx=>{const{_isDup,...clean}=tx;return{...clean,eid:envMap[tx.id]||tx.eid}});
    let next={...D,txs:[...final,...D.txs]};
    const incAmt=final.filter(t=>t.type==="inc").reduce((s,t)=>s+t.amt,0);if(incAmt>0)next.unal=(next.unal||0)+incAmt;
    sv(next);fl(`Imported ${final.length} transactions`);closeOv()};
  const setTxEnv=(txId,eid)=>setEnvMap({...envMap,[txId]:eid});
  return (<Ov title="Import CSV" onClose={closeOv} closing={ovClosing} ovSwap={ovSwap} G={G}>
    <Morph show={step===1} maxH={200} ms={250}>
      <div style={{fontSize:12,color:G?"#888":"#666",marginBottom:12}}>Select a CSV bank statement file from your device. SA banks (FNB, Absa, Capitec, Nedbank, Standard Bank) are all supported.</div>
      <label style={{display:"block",width:"100%",padding:"24px 16px",borderRadius:10,border:`2px dashed ${G?"rgba(255,255,255,.12)":"rgba(0,0,0,.12)"}`,background:G?"rgba(255,255,255,.02)":"rgba(0,0,0,.02)",textAlign:"center",cursor:"pointer",marginBottom:12}}>
        <div style={{fontSize:24,marginBottom:6}}>📂</div>
        <div style={{fontSize:12,fontWeight:600,color:A,fontFamily:F2}}>Tap to select CSV file</div>
        <input type="file" accept=".csv,.txt" onChange={loadFile} style={{display:"none"}}/>
      </label>
    </Morph>
    <Morph show={step===2} maxH={500} ms={250}>
      <div style={{fontSize:12,color:G?"#888":"#666",marginBottom:10}}>Found {rows.length} rows. Map the columns:</div>
      {[["Date column",dateCol,setDateCol],["Description column",descCol,setDescCol],["Amount column",amtCol,setAmtCol]].map(([lbl,val,setter])=>(<div key={lbl} style={{marginBottom:10}}>
        <Lbl G={G}>{lbl}</Lbl>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{headers.map((h,i)=>(<button key={i} onClick={()=>setter(i)} style={{padding:"4px 8px",borderRadius:5,border:`1px solid ${val===i?A:(G?"rgba(255,255,255,.08)":"rgba(0,0,0,.08)")}`,background:val===i?`${A}18`:"transparent",color:val===i?A:(G?"#888":"#999"),fontSize:10,fontFamily:F2,cursor:"pointer",...cT}}>{h||`Col ${i+1}`}</button>))}</div>
      </div>))}
      <div style={{fontSize:10,color:t3,marginBottom:10}}>Preview (first 3 rows):</div>
      <div style={{overflowX:"auto",marginBottom:14}}>{rows.slice(0,3).map((r,i)=>(<div key={i} style={{display:"flex",gap:8,padding:"4px 0",fontSize:10,borderBottom:`1px solid ${G?"rgba(255,255,255,.04)":"rgba(0,0,0,.04)"}`}}>
        <span style={{color:A,width:70,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r[dateCol]||"—"}</span>
        <span style={{flex:1,color:t1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r[descCol]||"—"}</span>
        <span style={{fontWeight:700,color:t1,flexShrink:0}}>{r[amtCol]||"—"}</span>
      </div>))}</div>
      {D.accounts?.length>0&&<div><Lbl G={G}>Import into Account</Lbl><div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:6}}>{D.accounts.map(acc=>(<button key={acc.id} onClick={()=>setAccId(acc.id)} style={{padding:"5px 10px",borderRadius:6,border:`1px solid ${accId===acc.id?A:(G?"rgba(255,255,255,.1)":"#ddd")}`,background:accId===acc.id?`${A}15`:(G?"#1a1a2a":"#fff"),color:accId===acc.id?A:(G?"#888":"#666"),fontSize:11,fontFamily:F2,cursor:"pointer",display:"flex",alignItems:"center",gap:4,...cT}}><span style={{fontSize:12}}>{acc.icon||"🏦"}</span>{acc.name}</button>))}</div><div style={{fontSize:9,color:G?"#666":"#999",marginBottom:14,lineHeight:1.4}}>💡 If these are historical transactions, you may need to adjust the account's opening balance in Settings afterwards.</div></div>}
      <button onClick={doParse} style={{...pb(),background:A}}>Parse Transactions →</button>
      <button onClick={()=>setStep(1)} style={{background:"none",border:"none",color:A,fontSize:12,fontFamily:F2,cursor:"pointer",display:"block",margin:"8px auto 0",...lT}}>← Back</button>
    </Morph>
    <Morph show={step===3} maxH={600} ms={250}>
      <div style={{fontSize:12,color:G?"#888":"#666",marginBottom:4}}>{parsed.length} transactions parsed ({parsed.filter(t=>t.type==="inc").length} income, {parsed.filter(t=>t.type==="exp").length} expenses)</div>
      {(parseWarns.skipped>0||parseWarns.dateFallback>0||parseWarns.dupes>0)&&<div style={{marginBottom:8}}>
        {parseWarns.skipped>0&&<div style={{fontSize:10,color:"#F59E0B",fontWeight:600,marginBottom:2}}>⚠ {parseWarns.skipped} row{parseWarns.skipped>1?"s":""} skipped (empty description or invalid amount)</div>}
        {parseWarns.dateFallback>0&&<div style={{fontSize:10,color:"#F59E0B",fontWeight:600,marginBottom:2}}>⚠ {parseWarns.dateFallback} date{parseWarns.dateFallback>1?"s":""} couldn't be parsed — set to today</div>}
        {parseWarns.dupes>0&&<div style={{fontSize:10,color:"#EF4444",fontWeight:600,marginBottom:2}}>⚠ {parseWarns.dupes} potential duplicate{parseWarns.dupes>1?"s":""} found (marked DUP)</div>}
      </div>}
      <div style={{fontSize:11,fontWeight:700,color:A,marginBottom:10}}>Review & assign envelopes:</div>
      <div style={{maxHeight:"45vh",overflowY:"auto",marginBottom:14}}>
        {parsed.map(tx=>{const curEid=envMap[tx.id]||tx.eid;const env=D.envs.find(e=>e.id===curEid);return(
          <div key={tx.id} style={{padding:"6px 0",borderBottom:`1px solid ${G?"rgba(255,255,255,.04)":"rgba(0,0,0,.04)"}`,opacity:tx._isDup?.6:1}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <div style={{display:"flex",alignItems:"center",gap:4,flex:1,overflow:"hidden"}}><span style={{fontSize:11,fontWeight:600,color:t1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{tx.payee}</span>{tx._isDup&&<span style={{fontSize:7,color:"#EF4444",fontWeight:700,background:"rgba(239,68,68,.12)",padding:"1px 4px",borderRadius:3,flexShrink:0}}>DUP?</span>}</div>
              <span style={{fontSize:11,fontWeight:700,color:tx.type==="inc"?A:"#EF4444",flexShrink:0}}>{tx.type==="inc"?"+":""}{fmt(tx.amt)}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <span style={{fontSize:9,color:t3}}>{new Date(tx.ts).toLocaleDateString("en-ZA",{day:"numeric",month:"short"})}</span>
              {tx.type==="exp"&&<EnvPick value={curEid} onChange={v=>setTxEnv(tx.id,v)} envs={D.envs} G={G} none="— None —" compact/>}
              {tx.type==="inc"&&<span style={{fontSize:9,color:A,fontWeight:600}}>Income</span>}
            </div>
          </div>
        )})}
      </div>
      <button onClick={doImport} disabled={parsed.length===0} style={{...pb(),background:A,opacity:parsed.length>0?1:.4}}>Import {parsed.length} Transactions</button>
      <button onClick={()=>setStep(2)} style={{background:"none",border:"none",color:A,fontSize:12,fontFamily:F2,cursor:"pointer",display:"block",margin:"8px auto 0",...lT}}>← Back</button>
    </Morph>
  </Ov>);
}

function PayDebtOv({D,sv,fl,G,ov,setOv,closeOv,ovClosing,ovSwap}){
  const debt=(D.debts||[]).find(d=>d.id===ov?.debtId);const[amt,setAmt]=useState(debt?String(debt.minPayment):"");const[accId,setAccId]=useState(D.accounts?.[0]?.id||"");
  if(!debt)return null;
  const v=parseFloat(amt)||0;
  const err=(()=>{if(v<=0)return null;if(v>debt.balance)return`Only ${fmt(debt.balance)} remaining`;return null})();
  const valid=v>0&&!err;
  const go=()=>{if(!valid)return;
    const tx={id:uid(),type:"exp",amt:-v,desc:`${debt.name} payment`,payee:debt.name,eid:"_debt",subcat:"",note:`Debt payment: ${debt.name}`,accountId:accId||"",debtId:debt.id,ts:Date.now()};
    let next={...D,txs:[tx,...D.txs],debts:D.debts.map(d=>d.id===debt.id?{...d,balance:d.balance-v}:d)};
    sv(next);fl(`Paid ${fmt(v)} on ${debt.name}`);closeOv();
  };
  return (<Ov title={`Pay: ${debt.name}`} onClose={closeOv} closing={ovClosing} ovSwap={ovSwap} G={G}>
    <div style={{textAlign:"center",marginBottom:14}}><span style={{fontSize:28}}>{debt.icon||"💳"}</span><div style={{fontSize:14,fontWeight:700,color:G?"#fff":"#1a1a2e",marginTop:4}}>Balance: {fmt(debt.balance)}</div>{debt.rate>0&&<div style={{fontSize:11,color:G?"#888":"#777",marginTop:2}}>{debt.rate}% APR · ~{fmt(debt.balance*(debt.rate/100)/12)}/mo interest</div>}</div>
    <Lbl G={G}>Payment Amount</Lbl><div style={{marginBottom:14}}><AmtIn value={amt} onChange={setAmt} G={G}/></div>
    <Morph show={!!err} maxH={50} ms={200}><div style={{fontSize:11,color:"#EF4444",fontWeight:600,marginBottom:14,padding:"4px 0",display:"flex",alignItems:"center",gap:4}}><span>⚠</span>{err}</div></Morph>
    {D.accounts?.length>0&&<div><Lbl G={G}>From Account</Lbl><div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:14}}>{D.accounts.map(acc=>(<button key={acc.id} onClick={()=>setAccId(acc.id)} style={{padding:"5px 10px",borderRadius:6,border:`1px solid ${accId===acc.id?A:(G?"rgba(255,255,255,.1)":"#ddd")}`,background:accId===acc.id?`${A}15`:(G?"#1a1a2a":"#fff"),color:accId===acc.id?A:(G?"#888":"#666"),fontSize:11,fontFamily:F2,cursor:"pointer",display:"flex",alignItems:"center",gap:4,...cT}}><span style={{fontSize:12}}>{acc.icon||"🏦"}</span>{acc.name}</button>))}</div></div>}
    <Morph show={!!(debt.minPayment>0&&v<debt.minPayment&&v>0)} maxH={50} ms={200}><div style={{fontSize:11,color:"#F59E0B",fontWeight:600,marginBottom:14,padding:"4px 0",display:"flex",alignItems:"center",gap:4}}><span>💡</span>Minimum payment is {fmt(debt.minPayment)}</div></Morph>
    <button onClick={go} disabled={!valid} style={{...pb(),background:A,opacity:valid?1:.4}}>Make Payment</button>
  </Ov>);
}

function CalendarOv({D,sv,fl,G,setOv,closeOv,ovClosing,ovSwap}){
  const[monthOff,setMonthOff]=useState(0);
  const t1=G?"#fff":"#1a1a2e",t2=G?"#888":"#777",t3=G?"#444":"#bbb";
  const now=new Date();
  const viewY=new Date(now.getFullYear(),now.getMonth()+monthOff,1).getFullYear();
  const viewM=new Date(now.getFullYear(),now.getMonth()+monthOff,1).getMonth();
  const firstDay=new Date(viewY,viewM,1).getDay();
  const daysInMonth=new Date(viewY,viewM+1,0).getDate();
  const mLabel=new Date(viewY,viewM).toLocaleDateString("en-ZA",{month:"long",year:"numeric"});
  // Project recurring into this month — generate all occurrences
  const bills=[];
  (D.recurring||[]).forEach(rec=>{
    const iv=rec.freq==="weekly"?6048e5:rec.freq==="biweekly"?12096e5:2592e6;
    let ts=rec.nextTs;
    // Walk backwards to find the first occurrence that could land in or before this month
    const monthStart=new Date(viewY,viewM,1).getTime();
    const monthEnd=new Date(viewY,viewM+1,0,23,59,59).getTime();
    while(ts>monthEnd+iv)ts-=iv;
    while(ts<monthStart-iv*2)ts+=iv;
    // Now walk forward and collect all occurrences in the visible month
    for(let i=0;i<6;i++){
      if(ts>=monthStart&&ts<=monthEnd){
        const d=new Date(ts);
        bills.push({...rec,occTs:ts,day:d.getDate(),isPast:ts<Date.now()});
      }
      ts+=iv;
      if(ts>monthEnd)break;
    }
  });
  const billDays=new Set(bills.map(b=>b.day));
  const today=now.getDate();const isCurrentMonth=viewY===now.getFullYear()&&viewM===now.getMonth();
  // Upcoming list — this month and next 30 days, sorted
  const upcoming=[...bills].sort((a,b)=>a.occTs-b.occTs);
  const daysUntil=ts=>{const d=Math.ceil((ts-Date.now())/864e5);return d===0?"Today":d===1?"Tomorrow":d<0?`${Math.abs(d)}d ago`:`in ${d}d`};
  return (<Ov title="Bill Calendar" onClose={closeOv} closing={ovClosing} ovSwap={ovSwap} G={G}>
    {/* Month nav */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <button onClick={()=>setMonthOff(monthOff-1)} style={{background:"none",border:"none",color:A,fontSize:18,cursor:"pointer",padding:"4px 8px",...lT}}>‹</button>
      <span style={{fontSize:14,fontWeight:700,color:t1}}>{mLabel}</span>
      <button onClick={()=>setMonthOff(monthOff+1)} style={{background:"none",border:"none",color:A,fontSize:18,cursor:"pointer",padding:"4px 8px",...lT}}>›</button>
    </div>
    {/* Day headers */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
      {["S","M","T","W","T","F","S"].map((d,i)=>(<div key={i} style={{textAlign:"center",fontSize:9,color:t3,fontWeight:600,padding:"4px 0"}}>{d}</div>))}
    </div>
    {/* Calendar grid */}
    <div key={`${viewY}-${viewM}`} style={{animation:"fi .2s ease"}}>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:16}}>
      {Array.from({length:firstDay}).map((_,i)=>(<div key={`e${i}`}/>))}
      {Array.from({length:daysInMonth}).map((_,i)=>{const day=i+1;const hasBill=billDays.has(day);const isToday=isCurrentMonth&&day===today;return(
        <div key={day} style={{textAlign:"center",padding:"6px 0",borderRadius:8,background:isToday?`${A}18`:"transparent",border:isToday?`1px solid ${A}44`:"1px solid transparent",position:"relative"}}>
          <span style={{fontSize:12,fontWeight:isToday?700:400,color:isToday?A:t1}}>{day}</span>
          {hasBill&&<div style={{position:"absolute",bottom:2,left:"50%",transform:"translateX(-50%)",width:4,height:4,borderRadius:2,background:"#F59E0B"}}/>}
        </div>
      )})}
    </div>
    {/* Upcoming bills list */}
    <div style={{fontSize:10,color:t3,fontWeight:600,letterSpacing:1,marginBottom:8}}>BILLS THIS MONTH ({upcoming.length})</div>
    {upcoming.length===0&&<div style={{padding:20,textAlign:"center",color:t3,fontSize:12,animation:"fi .3s ease"}}>No bills this month</div>}
    {upcoming.map((b,i)=>{const env=D.envs.find(e=>e.id===b.eid);return(
      <LPDiv key={`${b.id}-${b.day}`} onLong={()=>setOv({t:"graph",graphType:"payeeHistory",payee:b.payee})} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<upcoming.length-1?`1px solid ${G?"rgba(255,255,255,.04)":"rgba(0,0,0,.04)"}`:undefined,animation:`fu .3s ease ${i*.04}s both`,cursor:"pointer"}}>
        <div style={{width:32,textAlign:"center"}}><div style={{fontSize:16,fontWeight:800,color:b.isPast?"#EF4444":t1,fontFamily:F,lineHeight:1}}>{b.day}</div><div style={{fontSize:7,color:t3}}>{new Date(b.occTs).toLocaleDateString("en-ZA",{weekday:"short"})}</div></div>
        <div style={{width:4,height:28,borderRadius:2,background:env?.color||"#666",flexShrink:0}}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:600,color:t1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{b.payee}</div>
          <div style={{fontSize:10,color:t3}}>{env?.name||"?"} · {b.freq}</div>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontSize:13,fontWeight:700,color:t1}}>{fmt(Math.abs(b.amt))}</div>
          <div style={{fontSize:9,fontWeight:600,color:b.isPast?"#EF4444":A}}>{daysUntil(b.occTs)}</div>
        </div>
      </LPDiv>
    )})}
    {/* Monthly total */}
    {upcoming.length>0&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",marginTop:4,borderTop:`1px solid ${G?"rgba(255,255,255,.06)":"rgba(0,0,0,.06)"}`}}>
      <span style={{fontSize:11,color:t2,fontWeight:600}}>Total due</span>
      <span style={{fontSize:15,fontWeight:800,color:t1,fontFamily:F}}>{fmt(upcoming.reduce((s,b)=>s+Math.abs(b.amt),0))}</span>
    </div>}
    </div>
  </Ov>);
}
